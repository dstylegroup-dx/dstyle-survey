<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>よもぎ蒸し体質診断</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔮</text></svg>">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f5f7f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .diag-wrap { width: 100%; max-width: 560px; }

        /* ヘッダー */
        .diag-header { background: #4A5D4E; color: white; border-radius: 16px 16px 0 0; padding: 28px 28px 24px; text-align: center; }
        .diag-header h1 { font-size: 22px; font-weight: bold; margin-bottom: 8px; }
        .diag-header p { font-size: 14px; opacity: 0.85; line-height: 1.6; }

        /* 進捗バー */
        .progress-wrap { background: #3a4d3e; padding: 12px 28px; }
        .progress-bar-outer { background: rgba(255,255,255,0.2); border-radius: 20px; height: 8px; }
        .progress-bar-inner { background: white; border-radius: 20px; height: 8px; transition: width 0.4s ease; }
        .progress-text { color: rgba(255,255,255,0.8); font-size: 12px; text-align: right; margin-top: 4px; }

        /* コンテンツ */
        .diag-body { background: white; border-radius: 0 0 16px 16px; padding: 28px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .diag-body.is-result { padding: 16px; background: #eef0ee; }

        /* 質問 */
        .question-text { font-size: 18px; font-weight: bold; color: #2c3e50; margin-bottom: 20px; line-height: 1.5; }
        .choices { display: flex; flex-direction: column; gap: 10px; }
        .choice-btn { padding: 16px 20px; border: 2px solid #e0e0e0; border-radius: 10px; background: white; font-size: 15px; color: #333; cursor: pointer; text-align: left; transition: all 0.2s; }
        .choice-btn:hover { border-color: #4A5D4E; background: #f0f4f0; color: #4A5D4E; transform: translateY(-1px); }
        .choice-btn.selected { border-color: #4A5D4E; background: #4A5D4E; color: white; }

        /* 結果画面 */
        .result-screen { display: none; text-align: center; }

        /* 診断結果レポート風デザイン */
        .result-report { position: relative; background: #ffffff; border: 1px solid #e2e5e2; border-radius: 10px; padding: 0; overflow: hidden; box-shadow: 0 8px 24px rgba(0,0,0,0.08); }

        /* 文書ヘッダー（白基調・ビジネス文書風） */
        .result-report-top { background: #ffffff; padding: 28px 28px 20px; border-bottom: 3px solid #4A5D4E; }
        .result-doc-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .result-eyebrow { font-size: 10px; letter-spacing: 3px; color: #4A5D4E; font-weight: bold; text-transform: uppercase; }
        .result-doc-no { font-size: 10px; color: #aaa; letter-spacing: 0.5px; }
        .result-title-row { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
        .result-badge { display: inline-block; background: #4A5D4E; color: #fff; padding: 4px 12px; border-radius: 3px; font-size: 11px; font-weight: bold; letter-spacing: 0.5px; }
        .result-title { font-family: 'Hiragino Mincho ProN', 'Georgia', serif; font-size: 22px; font-weight: bold; color: #1f2a23; letter-spacing: 0.5px; }

        .result-report-body { padding: 24px 28px 26px; text-align: left; }
        .result-image { width: 100%; max-height: 180px; object-fit: cover; border-radius: 6px; margin-bottom: 20px; border: 1px solid #e2e5e2; }

        /* セクション共通（現状診断・提案） */
        .result-doc-section { margin-bottom: 22px; }
        .result-doc-section-head { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .result-doc-section-num { width: 22px; height: 22px; border-radius: 50%; background: #4A5D4E; color: #fff; font-size: 11px; font-weight: bold; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .result-doc-section-title { font-size: 13px; font-weight: bold; color: #4A5D4E; letter-spacing: 1px; }
        .result-doc-section-sub { font-size: 9px; color: #aab3a8; letter-spacing: 1px; margin-left: auto; text-transform: uppercase; }
        .result-doc-section-body { font-size: 14px; color: #3a4038; line-height: 1.9; padding-left: 32px; border-left: 2px solid #eef1ee; margin-left: 10px; }

        .result-course { position: relative; background: #f7f8f6; border: 1px solid #e2e5e2; border-radius: 6px; padding: 14px 16px 12px 18px; margin-top: 4px; }
        .result-course::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: #4A5D4E; border-radius: 3px 0 0 3px; }
        .result-course .label { font-size: 10px; color: #8aa28e; font-weight: bold; letter-spacing: 1px; margin-bottom: 3px; text-transform: uppercase; }
        .result-course .value { font-family: 'Hiragino Mincho ProN', 'Georgia', serif; font-size: 16px; font-weight: bold; color: #1f2a23; }

        .result-report-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 22px; padding-top: 14px; border-top: 1px solid #eef1ee; }
        .result-report-brand { font-size: 11px; color: #888; letter-spacing: 0.5px; }
        .result-report-date { font-size: 10px; color: #aaa; }

        .result-actions { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .btn-booking { display: block; padding: 16px; background: #4A5D4E; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; text-decoration: none; text-align: center; transition: background 0.2s; }
        .btn-booking:hover { background: #3a4d3e; }
        .btn-retry { display: block; padding: 14px; background: white; color: #4A5D4E; border: 2px solid #4A5D4E; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; text-align: center; transition: all 0.2s; }
        .btn-retry:hover { background: #f0f4f0; }

        /* エラー */
        .error-screen { display: none; text-align: center; padding: 40px 0; }
        .error-screen .icon { font-size: 48px; margin-bottom: 16px; }
        .error-screen p { color: #888; font-size: 14px; }

        /* ローディング */
        .loading-screen { text-align: center; padding: 40px 0; color: #888; }
    </style>
</head>
<body>
<div class="diag-wrap">
    <div class="diag-header">
        <h1 id="diagTitle">🔮 体質診断</h1>
        <p id="diagDescription">少しの質問であなたに合ったコースをご提案します。</p>
    </div>
    <div class="progress-wrap" id="progressWrap" style="display:none">
        <div class="progress-bar-outer">
            <div class="progress-bar-inner" id="progressBar" style="width:0%"></div>
        </div>
        <div class="progress-text" id="progressText">1 / 5</div>
    </div>
    <div class="diag-body">
        <!-- ローディング -->
        <div class="loading-screen" id="loadingScreen">読み込み中...</div>

        <!-- 質問画面 -->
        <div id="questionScreen" style="display:none">
            <div class="question-text" id="questionText"></div>
            <div class="choices" id="choiceList"></div>
        </div>

        <!-- 結果画面 -->
        <div class="result-screen" id="resultScreen">
            <div class="result-report">
                <div class="result-report-top">
                    <div class="result-doc-meta">
                        <div class="result-eyebrow">DIAGNOSIS REPORT</div>
                        <div class="result-doc-no" id="resultDocNo"></div>
                    </div>
                    <div class="result-title-row">
                        <span class="result-badge">体質タイプ</span>
                        <span class="result-title" id="resultTitle"></span>
                    </div>
                </div>
                <div class="result-report-body">
                    <img class="result-image" id="resultImage" src="" alt="" style="display:none">

                    <div class="result-doc-section">
                        <div class="result-doc-section-head">
                            <div class="result-doc-section-num">1</div>
                            <div class="result-doc-section-title">現状診断</div>
                            <div class="result-doc-section-sub">Assessment</div>
                        </div>
                        <div class="result-doc-section-body" id="resultAssessment"></div>
                    </div>

                    <div class="result-doc-section" style="margin-bottom:0">
                        <div class="result-doc-section-head">
                            <div class="result-doc-section-num">2</div>
                            <div class="result-doc-section-title">ご提案</div>
                            <div class="result-doc-section-sub">Proposal</div>
                        </div>
                        <div class="result-doc-section-body">
                            <div id="resultDescription"></div>
                            <div class="result-course" id="resultCourseWrap" style="display:none">
                                <div class="label">Recommended Course</div>
                                <div class="value" id="resultCourse"></div>
                            </div>
                        </div>
                    </div>

                    <div class="result-report-footer">
                        <div class="result-report-brand" id="resultBrand">Herbelle よもぎ蒸しサロン</div>
                        <div class="result-report-date" id="resultDate"></div>
                    </div>
                </div>
            </div>
            <div class="result-actions">
                <a class="btn-booking" id="bookingBtn" href="#" target="_blank" style="display:none">📅 予約はこちら</a>
                <button class="btn-retry" onclick="startDiagnosis()">🔄 もう一度診断する</button>
            </div>
        </div>

        <!-- 受付停止画面 -->
        <div id="closedScreen" style="display:none;text-align:center;padding:40px 0">
            <div style="font-size:48px;margin-bottom:16px">🔒</div>
            <div style="font-size:18px;font-weight:bold;color:#2c3e50;margin-bottom:8px">現在受付しておりません</div>
            <div style="font-size:14px;color:#888">この診断は現在公開されていません。<br>しばらく経ってから再度アクセスしてください。</div>
        </div>

        <!-- エラー画面 -->
        <div class="error-screen" id="errorScreen">
            <div class="icon">⚠️</div>
            <p id="errorMsg">診断データを読み込めませんでした。</p>
        </div>
    </div>
</div>

<script>
    var BASE_URL = location.hostname === 'localhost'
        ? 'http://localhost:7071'
        : 'https://func-dstyle-survey-gab2dwg3gdcqecgz.japaneast-01.azurewebsites.net';

    var TENANT = 'herbelle';
    var diagData = null;
    var currentQIndex = 0;
    var scores = {};

    // ============================================================
    // 初期化
    // ============================================================
    async function init() {
        try {
            var params = new URLSearchParams(location.search);
            var diagId = params.get('id') || params.get('diagId') || '';
            var url = BASE_URL + '/api/diagnosis?tenant=' + TENANT + (diagId ? '&diagId=' + diagId : '');
            var res = await fetch(url);
            if (!res.ok) throw new Error('データ取得失敗');
            diagData = await res.json();
            if (!diagData.questions || !diagData.questions.length) throw new Error('診断データが設定されていません');

            // ヘッダー更新
            if (diagData.title) document.getElementById('diagTitle').textContent = '🔮 ' + diagData.title;
            if (diagData.description) document.getElementById('diagDescription').textContent = diagData.description;
            document.title = diagData.title || '体質診断';

            // 公開チェック
            if (diagData.active === false) {
                document.getElementById('loadingScreen').style.display = 'none';
                document.getElementById('closedScreen').style.display = 'block';
                return;
            }
            startDiagnosis();
        } catch(e) {
            document.getElementById('loadingScreen').style.display = 'none';
            document.getElementById('errorScreen').style.display = 'block';
            document.getElementById('errorMsg').textContent = e.message;
        }
    }

    // ============================================================
    // 診断開始
    // ============================================================
    function startDiagnosis() {
        currentQIndex = 0;
        scores = {};
        Object.keys(diagData.results || {}).forEach(function(k) { scores[k] = 0; });
        document.getElementById('resultScreen').style.display = 'none';
        document.getElementById('errorScreen').style.display = 'none';
        document.getElementById('progressWrap').style.display = 'block';
        document.querySelector('.diag-body').classList.remove('is-result');
        showQuestion();
    }

    // ============================================================
    // 質問表示
    // ============================================================
    function showQuestion() {
        var q = diagData.questions[currentQIndex];
        var total = diagData.questions.length;

        // 進捗バー
        var pct = Math.round((currentQIndex / total) * 100);
        document.getElementById('progressBar').style.width = pct + '%';
        document.getElementById('progressText').textContent = (currentQIndex + 1) + ' / ' + total;

        // 質問文
        document.getElementById('questionText').textContent = q.text;

        // 選択肢
        var choiceList = document.getElementById('choiceList');
        choiceList.innerHTML = (q.choices || []).map(function(c, i) {
            return '<button class="choice-btn" onclick="selectChoice(' + i + ')">' + escHtml(c.label) + '</button>';
        }).join('');

        document.getElementById('loadingScreen').style.display = 'none';
        document.getElementById('questionScreen').style.display = 'block';
    }

    // ============================================================
    // 選択肢を選ぶ
    // ============================================================
    function selectChoice(choiceIdx) {
        // ハイライト
        document.querySelectorAll('.choice-btn').forEach(function(b, i) {
            b.classList.toggle('selected', i === choiceIdx);
        });

        // スコア加算
        var choice = diagData.questions[currentQIndex].choices[choiceIdx];
        Object.keys(choice.scores || {}).forEach(function(k) {
            scores[k] = (scores[k] || 0) + (choice.scores[k] || 0);
        });

        // 次へ（少し遅延してから）
        setTimeout(function() {
            currentQIndex++;
            if (currentQIndex < diagData.questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }, 350);
    }

    // ============================================================
    // 結果表示
    // ============================================================
    function showResult() {
        // 最高スコアのパターンを取得
        var maxKey = Object.keys(scores).reduce(function(a, b) {
            return (scores[a] || 0) >= (scores[b] || 0) ? a : b;
        });
        var result = diagData.results[maxKey];
        if (!result) { showError('結果データが見つかりません'); return; }

        // 進捗バー100%
        document.getElementById('progressBar').style.width = '100%';
        document.getElementById('progressText').textContent = '診断完了！';

        // 結果画面
        document.getElementById('questionScreen').style.display = 'none';
        document.getElementById('resultScreen').style.display = 'block';
        document.querySelector('.diag-body').classList.add('is-result');
        document.getElementById('resultTitle').textContent = result.title || '';

        // 現状診断セクション：タイプ名を簡潔な説明文として表示
        document.getElementById('resultAssessment').textContent =
            result.title ? ('診断の結果、あなたは「' + result.title + '」の傾向が見られます。') : '';

        // 文書番号・日付
        var today = new Date();
        var dateStr = today.getFullYear() + '.' + String(today.getMonth()+1).padStart(2,'0') + '.' + String(today.getDate()).padStart(2,'0');
        document.getElementById('resultDate').textContent = dateStr;
        document.getElementById('resultDocNo').textContent = 'No. ' + dateStr.replace(/\./g, '') + '-' + Math.floor(Math.random()*900+100);
        if (diagData.title) {
            document.getElementById('resultBrand').textContent = diagData.title;
        }

        // 画像
        if (result.imageBase64) {
            document.getElementById('resultImage').src = result.imageBase64;
            document.getElementById('resultImage').style.display = 'block';
        } else {
            document.getElementById('resultImage').style.display = 'none';
        }

        // コース
        if (result.course) {
            document.getElementById('resultCourse').textContent = result.course;
            document.getElementById('resultCourseWrap').style.display = 'block';
        } else {
            document.getElementById('resultCourseWrap').style.display = 'none';
        }

        // 説明文（提案セクション）
        document.getElementById('resultDescription').textContent = result.description || '';

        // 予約ボタン
        if (result.bookingUrl) {
            var btn = document.getElementById('bookingBtn');
            btn.href = result.bookingUrl;
            btn.style.display = 'block';
        } else {
            document.getElementById('bookingBtn').style.display = 'none';
        }

        // ログ送信
        fetch(BASE_URL + '/api/diagnosislog', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ tenant: TENANT, resultKey: maxKey, resultTitle: result.title, diagTitle: diagData.title || '', diagId: diagData.diagId || diagData.id || '' })
        }).catch(function() {});
    }

    function showError(msg) {
        document.getElementById('questionScreen').style.display = 'none';
        document.getElementById('errorScreen').style.display = 'block';
        document.getElementById('errorMsg').textContent = msg;
    }

    function escHtml(str) {
        if (!str) return '';
        return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }

    init();
</script>
</body>
</html>
