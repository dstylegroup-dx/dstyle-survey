<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dstyle コンテスト 閲覧ページ</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏆</text></svg>">
  <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f7f3f6; color: #333; min-height: 100vh; }

    /* ローディング */
    #loadingScreen {
      position: fixed; inset: 0; background: #f7f3f6;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
      z-index: 9999;
    }
    .loading-logo { font-size: 52px; }
    .loading-text { color: #7B4F6E; font-size: 15px; font-weight: bold; }
    .spinner { width: 36px; height: 36px; border: 3px solid #e8d6e3; border-top-color: #7B4F6E; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ログイン */
    #loginScreen { display: none; min-height: 100vh; align-items: center; justify-content: center; padding: 20px; }
    #loginScreen.show { display: flex; }
    .login-box { background: white; border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 420px; box-shadow: 0 8px 32px rgba(123,79,110,0.12); text-align: center; }
    .login-logo { font-size: 56px; margin-bottom: 12px; }
    .login-box h1 { font-size: 22px; color: #7B4F6E; margin-bottom: 6px; }
    .login-box p { font-size: 13px; color: #888; margin-bottom: 32px; line-height: 1.6; }
    .btn-ms {
      display: flex; align-items: center; justify-content: center; gap: 12px;
      width: 100%; padding: 14px 20px; background: #0078d4; color: white;
      border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer;
    }
    .btn-ms:hover { background: #006abd; }
    .login-error { background: #fdf0ef; border: 1px solid #f5c6c2; color: #c0392b; border-radius: 8px; padding: 12px 16px; font-size: 13px; margin-top: 16px; display: none; }
    .login-note { font-size: 12px; color: #aaa; margin-top: 20px; }

    /* メイン */
    #mainScreen { display: none; }
    #mainScreen.show { display: block; }

    .topbar {
      background: #7B4F6E; color: white; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between;
      height: 56px; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
    }
    .topbar-left { display: flex; align-items: center; gap: 10px; }
    .topbar h1 { font-size: 16px; }
    .topbar-right { display: flex; align-items: center; gap: 10px; }
    .user-badge { background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 20px; font-size: 12px; }
    .btn-logout { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); color: white; padding: 6px 14px; border-radius: 6px; font-size: 13px; cursor: pointer; }
    .btn-logout:hover { background: rgba(255,255,255,0.25); }

    .main { padding: 24px; max-width: 1300px; margin: 0 auto; }

    /* コンテスト選択バー */
    .contest-bar {
      background: white; border-radius: 10px; padding: 16px 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px;
      display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    }
    .contest-bar label { font-size: 13px; font-weight: bold; color: #555; white-space: nowrap; }
    .select-wrap { position: relative; flex: 1; min-width: 240px; max-width: 400px; }
    .select-wrap::after { content: "▼"; position: absolute; right: 12px; top: 50%; transform: translateY(-50%); color: #7B4F6E; font-size: 10px; pointer-events: none; }
    .contest-select {
      width: 100%; padding: 10px 32px 10px 14px; border: 1.5px solid #ddd;
      border-radius: 8px; font-size: 14px; background: #fafafa;
      -webkit-appearance: none; appearance: none;
    }
    .contest-select:focus { border-color: #7B4F6E; outline: none; }
    .contest-badge {
      background: #f5eaf2; color: #7B4F6E; border: 1px solid #e0c8d8;
      border-radius: 20px; padding: 4px 14px; font-size: 13px; font-weight: bold;
      white-space: nowrap;
    }

    /* サマリー */
    .summary-row { display: flex; gap: 14px; margin-bottom: 20px; flex-wrap: wrap; }
    .summary-card { background: white; border-radius: 10px; padding: 16px 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); flex: 1; min-width: 140px; }
    .summary-card .lbl { font-size: 11px; color: #888; margin-bottom: 4px; }
    .summary-card .val { font-size: 26px; font-weight: bold; color: #7B4F6E; }
    .summary-card .sub { font-size: 11px; color: #aaa; }

    /* ツールバー */
    .toolbar {
      background: white; border-radius: 10px; padding: 14px 18px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 16px;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .search-input { padding: 8px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; width: 200px; }
    .search-input:focus { border-color: #7B4F6E; outline: none; }
    .btn { padding: 8px 16px; border: none; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; transition: all 0.2s; white-space: nowrap; }
    .btn-primary { background: #7B4F6E; color: white; }
    .btn-primary:hover { background: #68435d; }
    .btn-success { background: #27ae60; color: white; }
    .btn-success:hover { background: #219a52; }
    .btn-secondary { background: #f5f5f5; color: #666; border: 1px solid #ddd; }
    .btn-secondary:hover { background: #eee; }
    .ml-auto { margin-left: auto; }
    .db-status { display: flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
    .db-status.connected { background: #e8f5e9; color: #2e7d32; }
    .db-status.disconnected { background: #fff3e0; color: #e65100; }
    .db-dot { width: 7px; height: 7px; border-radius: 50%; }
    .db-status.connected .db-dot { background: #4caf50; }
    .db-status.disconnected .db-dot { background: #ff9800; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.3} }

    /* 応募者グリッド */
    .applicant-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .applicant-card {
      background: white; border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      border: 2px solid transparent;
      cursor: pointer; transition: all 0.2s;
      overflow: hidden;
    }
    .applicant-card:hover { border-color: #7B4F6E; transform: translateY(-2px); box-shadow: 0 6px 20px rgba(123,79,110,0.15); }
    .card-header { background: linear-gradient(135deg, #7B4F6E, #a06090); color: white; padding: 14px 16px; }
    .card-num { font-size: 11px; opacity: 0.8; margin-bottom: 2px; }
    .card-name { font-size: 17px; font-weight: bold; }
    .card-kana { font-size: 12px; opacity: 0.85; margin-top: 2px; }
    .card-body { padding: 14px 16px; }
    .card-row { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid #f5f0f3; font-size: 13px; }
    .card-row:last-child { border-bottom: none; }
    .card-row .key { color: #888; font-size: 12px; }
    .card-row .val { font-weight: bold; color: #333; font-family: monospace; }
    .card-footer { background: #fdf8fb; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; }
    .card-date { font-size: 11px; color: #aaa; }
    .card-arrow { color: #7B4F6E; font-size: 18px; }
    .has-measure { border-left: 4px solid #27ae60; }
    .measure-chip { background: #e8f5e9; color: #2e7d32; border-radius: 10px; padding: 2px 8px; font-size: 11px; font-weight: bold; }
    .no-measure-chip { background: #fff3e0; color: #e65100; border-radius: 10px; padding: 2px 8px; font-size: 11px; }

    /* 画像サムネイル */
    .img-thumb-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
    .img-thumb { width: 48px; height: 48px; object-fit: cover; border-radius: 6px; border: 1px solid #ddd; cursor: pointer; }

    /* 空状態 */
    .empty-state { text-align: center; padding: 60px 20px; color: #aaa; background: white; border-radius: 12px; }
    .empty-icon { font-size: 48px; margin-bottom: 12px; }

    /* エラーバナー */
    .error-banner { background: #fdf0ef; border: 1px solid #f5c6c2; color: #c0392b; border-radius: 8px; padding: 12px 16px; font-size: 13px; margin-bottom: 16px; display: none; }

    /* ページネーション */
    .pagination { display: flex; align-items: center; justify-content: center; gap: 6px; padding: 20px 0; }
    .page-btn { padding: 6px 12px; border: 1px solid #ddd; border-radius: 6px; background: white; cursor: pointer; font-size: 13px; color: #666; }
    .page-btn:hover:not(:disabled) { border-color: #7B4F6E; color: #7B4F6E; }
    .page-btn.active { background: #7B4F6E; color: white; border-color: #7B4F6E; }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .page-info { font-size: 13px; color: #888; }

    /* ==============================
       詳細モーダル
    ============================== */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 1000;
      overflow-y: auto;
      background: rgba(50,20,40,0.7);
      padding: 0;
    }
    .modal-overlay.show { display: block; }
    .modal {
      background: white;
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
    }
    /* モーダルヘッダー */
    .modal-header {
      background: linear-gradient(135deg, #7B4F6E, #a06090);
      color: white; padding: 14px 20px;
      display: flex; align-items: center; gap: 10px;
      position: sticky; top: 0; z-index: 10;
      flex-shrink: 0;
    }
    .modal-nav { display: flex; gap: 6px; }
    .modal-nav-btn {
      background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3);
      color: white; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 14px;
      white-space: nowrap;
    }
    .modal-nav-btn:hover:not(:disabled) { background: rgba(255,255,255,0.35); }
    .modal-nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .modal-title-wrap { flex: 1; min-width: 0; }
    .modal-subtitle { font-size: 11px; opacity: 0.8; }
    .modal-name { font-size: 18px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .modal-kana { font-size: 12px; opacity: 0.85; }
    .modal-csv-btn {
      background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.4);
      color: white; padding: 6px 14px; border-radius: 6px; cursor: pointer;
      font-size: 13px; font-weight: bold; white-space: nowrap; flex-shrink: 0;
    }
    .modal-csv-btn:hover { background: rgba(255,255,255,0.35); }
    .modal-close { background: none; border: none; color: white; font-size: 24px; cursor: pointer; padding: 4px 8px; border-radius: 4px; flex-shrink: 0; line-height: 1; }
    .modal-close:hover { background: rgba(255,255,255,0.2); }

    /* モーダルボディ */
    .modal-body { padding: 20px; display: flex; flex-direction: column; gap: 16px; flex: 1; }

    .detail-section { border: 1.5px solid #f0e8ed; border-radius: 10px; background: white; }
    .detail-section-header {
      background: #fdf8fb; padding: 10px 16px;
      font-size: 12px; font-weight: bold; color: #7B4F6E;
      letter-spacing: 0.5px; border-bottom: 1px solid #f0e8ed;
      display: flex; align-items: center; gap: 6px;
      border-radius: 10px 10px 0 0;
    }
    .detail-section-body { padding: 8px 16px 16px; }

    /* 応募内容 */
    .answer-grid { display: grid; grid-template-columns: 1fr; gap: 0; }
    .answer-item { display: grid; grid-template-columns: 160px 1fr; align-items: baseline; padding: 11px 8px; border-bottom: 1px solid #f0e8ed; gap: 16px; }
    .answer-item:last-child { border-bottom: none; }
    .answer-lbl { font-size: 12px; color: #888; font-weight: bold; line-height: 1.5; }
    .answer-val { font-size: 14px; color: #333; word-break: break-word; line-height: 1.7; white-space: pre-wrap; }

    /* 採寸グリッド */
    .measure-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
    .measure-block { background: #f0f9f5; border: 1px solid #c8e6da; border-radius: 8px; padding: 10px 12px; }
    .m-lbl { font-size: 11px; color: #666; margin-bottom: 2px; }
    .m-val { font-size: 18px; font-weight: bold; color: #2e7d32; }
    .m-unit { font-size: 11px; color: #888; }
    .size-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 12px; }
    .size-block { background: #f5eaf2; border: 1px solid #e0c8d8; border-radius: 8px; padding: 10px 12px; text-align: center; }
    .size-lbl { font-size: 11px; color: #7B4F6E; margin-bottom: 4px; }
    .size-val { font-size: 20px; font-weight: bold; color: #7B4F6E; }

    /* 理想値 */
    .coming-soon { color: #aaa; font-size: 13px; font-style: italic; padding: 16px; text-align: center; }

    /* 画像ギャラリー */
    .img-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 14px; }
    .img-gallery-item { border-radius: 10px; overflow: hidden; border: 1px solid #ddd; cursor: pointer; position: relative; background: #f5f5f5; aspect-ratio: 4/3; }
    .img-gallery-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .no-image { color: #aaa; font-size: 13px; padding: 24px; text-align: center; }

    /* 画像ライトボックス */
    .lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; align-items: center; justify-content: center; }
    .lightbox.show { display: flex; }
    .lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: 8px; }
    .lightbox-close { position: absolute; top: 16px; right: 20px; color: white; font-size: 32px; cursor: pointer; background: none; border: none; }

    /* 未選択状態 */
    .no-contest { text-align: center; padding: 80px 20px; color: #aaa; }
    .no-contest-icon { font-size: 56px; margin-bottom: 16px; }
    .no-contest p { font-size: 15px; }

    /* 画像オーバーレイ（DLボタン常時表示） */
    .img-gallery-overlay {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(transparent, rgba(0,0,0,0.75));
      padding: 8px 10px 10px; display: flex; flex-direction: column; gap: 6px;
    }
    .img-gallery-label { color: white; font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .img-action-row { display: flex; gap: 6px; }
    .img-action-btn {
      background: rgba(255,255,255,0.25); border: 1px solid rgba(255,255,255,0.5);
      color: white; padding: 4px 10px; border-radius: 6px; font-size: 12px;
      cursor: pointer; text-decoration: none; display: inline-block; flex: 1; text-align: center;
    }
    .img-action-btn:hover { background: rgba(255,255,255,0.4); }

    /* タブレット・スマホ対応 */
    @media (max-width: 768px) {
      .topbar h1 { font-size: 13px; }
      .topbar-right { gap: 6px; }
      .user-badge { display: none; }
      .main { padding: 12px; }
      .summary-row { gap: 8px; flex-wrap: wrap; }
      .summary-card { min-width: calc(50% - 4px); padding: 12px 14px; }
      .summary-card .val { font-size: 22px; }
      .contest-bar { flex-wrap: wrap; gap: 10px; padding: 12px 14px; }
      .select-wrap { max-width: 100%; min-width: 100%; }
      .applicant-grid { grid-template-columns: 1fr; gap: 12px; }
      .toolbar { flex-wrap: wrap; gap: 8px; padding: 12px 14px; }
      .search-input { width: 100%; }
      .modal-header { padding: 10px 14px; gap: 8px; }
      .modal-nav-btn { padding: 5px 10px; font-size: 12px; }
      .modal-name { font-size: 15px; }
      .modal-body { padding: 12px; gap: 12px; }
      .answer-item { grid-template-columns: 100px 1fr; gap: 8px; padding: 9px 4px; }
      .answer-lbl { font-size: 11px; }
      .answer-val { font-size: 13px; }
      .measure-grid { grid-template-columns: repeat(2, 1fr); }
      .size-grid { grid-template-columns: repeat(3, 1fr); }
      .img-gallery { grid-template-columns: repeat(2, 1fr); gap: 10px; }
      .detail-section-body { padding: 6px 12px 12px; }
      .answer-grid { grid-template-columns: 1fr; }
      .img-gallery { grid-template-columns: repeat(2, 1fr); }
      .img-gallery-overlay { opacity: 1; }
      .detail-section-body { padding: 12px; }
      .modal-nav-btn { padding: 5px 10px; font-size: 13px; }
    }

    @media (max-width: 400px) {
      .applicant-grid { grid-template-columns: 1fr; }
      .summary-row { flex-direction: column; }
    }
  </style>
</head>
<body>

<!-- ローディング -->
<div id="loadingScreen">
  <div class="loading-logo">🏆</div>
  <div class="spinner"></div>
  <div class="loading-text">認証を確認しています...</div>
</div>

<!-- ログイン -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">🏆</div>
    <h1>Dstyle コンテスト 閲覧</h1>
    <p>Microsoftアカウントでログインしてください。<br>アクセスには所定のグループ権限が必要です。</p>
    <button class="btn-ms" id="loginBtn" onclick="doLogin()" disabled style="opacity:0.6;cursor:not-allowed;">
      <svg width="20" height="20" viewBox="0 0 21 21" fill="none"><rect width="10" height="10" fill="#F25022"/><rect x="11" width="10" height="10" fill="#7FBA00"/><rect y="11" width="10" height="10" fill="#00A4EF"/><rect x="11" y="11" width="10" height="10" fill="#FFB900"/></svg>
      Microsoftアカウントでログイン
    </button>
    <div class="login-error" id="loginError"></div>
    <div class="login-note">ディライトテクノロジーズ事業部・Diana グループのメンバーのみ閲覧できます</div>
  </div>
</div>

<!-- メイン -->
<div id="mainScreen">
  <div class="topbar">
    <div class="topbar-left">
      <span>🏆</span>
      <h1>Dstyle コンテスト 閲覧ページ</h1>
    </div>
    <div class="topbar-right">
      <span class="user-badge" id="userBadge">ログイン中</span>
      <button class="btn-logout" onclick="doLogout()">ログアウト</button>
    </div>
  </div>

  <div class="main">
    <div class="error-banner" id="errorBanner"></div>

    <!-- コンテスト選択 -->
    <div class="contest-bar">
      <label>🏆 コンテスト選択：</label>
      <div class="select-wrap">
        <select class="contest-select" id="contestSelect" onchange="onContestChange()">
          <option value="">読み込み中...</option>
        </select>
      </div>
      <span class="contest-badge" id="contestBadge" style="display:none"></span>
      <div class="ml-auto" style="display:flex;gap:8px;">
        <button class="btn btn-success" onclick="downloadCSV()" id="csvBtn" style="display:none">📥 CSV出力</button>
        <button class="btn btn-primary" onclick="loadResponses()" id="refreshBtn" style="display:none">🔄 更新</button>
      </div>
    </div>

    <!-- 未選択 -->
    <div id="noContestMsg" class="no-contest">
      <div class="no-contest-icon">🏆</div>
      <p>上のドロップダウンからコンテストを選択してください</p>
    </div>

    <!-- データエリア -->
    <div id="dataArea" style="display:none">
      <!-- サマリー -->
      <div class="summary-row">
        <div class="summary-card">
          <div class="lbl">総応募者数</div>
          <div class="val" id="totalCount">0</div>
          <div class="sub">名</div>
        </div>
        <div class="summary-card">
          <div class="lbl">採寸データ取得済み</div>
          <div class="val" id="matchedCount">0</div>
          <div class="sub">名 / DB照合済み</div>
        </div>
        <div class="summary-card">
          <div class="lbl">最終更新</div>
          <div class="val" style="font-size:16px;" id="lastUpdated">-</div>
          <div class="sub">自動取得</div>
        </div>
        <div class="summary-card" style="display:flex;align-items:center;">
          <div id="dbStatus" class="db-status disconnected">
            <div class="db-dot"></div>採寸DB 未接続
          </div>
        </div>
      </div>

      <!-- ツールバー -->
      <div class="toolbar">
        <span style="font-size:13px;font-weight:bold;color:#555;">🔍 絞り込み：</span>
        <input type="text" class="search-input" id="searchInput" placeholder="氏名・コードで検索..." oninput="applyFilter()">
        <button class="btn btn-secondary" onclick="clearSearch()">クリア</button>
        <span id="filterCount" style="font-size:13px;color:#7B4F6E;font-weight:bold;"></span>
      </div>

      <!-- グリッド -->
      <div class="applicant-grid" id="applicantGrid"></div>
      <div class="pagination" id="pagination" style="display:none;"></div>
    </div>
  </div>
</div>

<!-- 詳細モーダル -->
<div class="modal-overlay" id="detailModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-nav">
        <button class="modal-nav-btn" id="prevBtn" onclick="navigate(-1)">◀ 前</button>
        <button class="modal-nav-btn" id="nextBtn" onclick="navigate(1)">次 ▶</button>
      </div>
      <div class="modal-title-wrap">
        <div class="modal-subtitle" id="modalSubtitle">1 / 10</div>

      </div>
      <button class="modal-csv-btn" onclick="downloadSingleCSV()" title="この応募者のデータをCSVでダウンロード">📥 CSV</button>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<!-- ライトボックス -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightboxImg" src="" alt="">
</div>

<script>
// ============================================================
// 設定
// ============================================================
const MSAL_CONFIG = {
  auth: {
    clientId: '1f4f2ade-4eeb-4f65-8fbd-394378a63518',
    authority: 'https://login.microsoftonline.com/2648ac1f-8786-40fb-80f8-14bd84511449',
    redirectUri: window.location.origin + '/diana-contest-viewer.html'
  },
  cache: { cacheLocation: 'sessionStorage', storeAuthStateInCookie: false }
};
const ALLOWED_GROUPS = [
  '560396ae-5774-4b3e-b451-9602d140f921', // 株式会社ダイアナ
  '6e4af16e-cfe1-49a6-968e-05b8cef847d8'  // ディライトテクノロジーズ事業部
];
const TENANT = 'diana';
const BASE_URL = location.hostname === 'localhost'
  ? 'http://localhost:7071'
  : 'https://func-dstyle-survey-gab2dwg3gdcqecgz.japaneast-01.azurewebsites.net';

// ============================================================
// 状態
// ============================================================
let msalInstance = null;
let currentAccount = null;
let adminToken = null;
let allResponses = [];
let filteredResponses = [];
let currentPage = 1;
const PAGE_SIZE = 24;
let dbConnected = false;
let currentDetailIndex = -1;
let currentContest = null;

function esc(str) {
  if (str == null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

// ============================================================
// MSAL
// ============================================================
async function initMsal() {
  try {
    msalInstance = new msal.PublicClientApplication(MSAL_CONFIG);
    await msalInstance.initialize();
    const result = await msalInstance.handleRedirectPromise();
    if (result) currentAccount = result.account;
    else {
      const accounts = msalInstance.getAllAccounts();
      if (accounts.length > 0) currentAccount = accounts[0];
    }
    // 初期化完了後にログインボタンを有効化
    const btn = document.getElementById('loginBtn');
    if (btn) { btn.disabled = false; btn.style.opacity = '1'; btn.style.cursor = 'pointer'; }

    if (currentAccount) await checkAccessAndShow();
    else showLogin();
  } catch (e) {
    console.error('MSAL初期化エラー:', e);
    const btn = document.getElementById('loginBtn');
    if (btn) { btn.disabled = false; btn.style.opacity = '1'; btn.style.cursor = 'pointer'; }
    showLogin();
  }
}

async function doLogin() {
  if (!msalInstance) { showLoginError('初期化中です。少し待ってから再度お試しください。'); return; }
  try { await msalInstance.loginRedirect({ scopes: ['User.Read', 'GroupMember.Read.All'] }); }
  catch (e) { showLoginError('ログインに失敗しました: ' + e.message); }
}

async function doLogout() {
  sessionStorage.removeItem('adminToken');
  await msalInstance.logoutRedirect({ account: currentAccount });
}

async function checkAccessAndShow() {
  setLoadingText('グループ権限を確認しています...');
  try {
    const token = await msalInstance.acquireTokenSilent({ scopes: ['GroupMember.Read.All'], account: currentAccount });
    const res = await fetch('https://graph.microsoft.com/v1.0/me/memberOf?$select=id', { headers: { Authorization: 'Bearer ' + token.accessToken } });
    const data = await res.json();
    const userGroups = (data.value || []).map(g => g.id.toLowerCase());
    const hasAccess = ALLOWED_GROUPS.some(g => userGroups.includes(g.toLowerCase()));
    if (!hasAccess) { showLoginError('アクセス権限がありません。<br>ディライトテクノロジーズ事業部またはDianaグループのメンバーのみ閲覧できます。'); showLogin(); return; }
    document.getElementById('userBadge').textContent = currentAccount.name || currentAccount.username;
    hideLoading();
    showMain();
    await getAdminToken();
    await loadContestList();
  } catch (e) { showLoginError('権限の確認中にエラーが発生しました。再度ログインしてください。'); showLogin(); }
}

async function getAdminToken() {
  const saved = sessionStorage.getItem('adminToken');
  if (saved) { adminToken = saved; return; }
  try {
    // MSALのIDトークンとアクセストークンを取得
    const tokenRes = await msalInstance.acquireTokenSilent({
      scopes: ['User.Read', 'GroupMember.Read.All'],
      account: currentAccount
    });
    // /api/msalauth でサーバー側トークンを発行
    const res = await fetch(BASE_URL + '/api/msalauth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        idToken: tokenRes.idToken,
        accessToken: tokenRes.accessToken,
        tenant: TENANT
      })
    });
    if (res.ok) {
      const data = await res.json();
      adminToken = data.token;
      sessionStorage.setItem('adminToken', adminToken);
    } else {
      const err = await res.json();
      throw new Error(err.error || 'トークン取得失敗');
    }
  } catch (e) {
    console.error('管理トークン取得エラー:', e.message);
    throw e;
  }
}

// ============================================================
// コンテスト一覧取得
// ============================================================
async function loadContestList() {
  try {
    const res = await fetch(BASE_URL + '/api/surveys?tenant=' + TENANT);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const surveys = await res.json();
    const contests = surveys.filter(s => s.isContest === true);
    const sel = document.getElementById('contestSelect');
    if (contests.length === 0) {
      sel.innerHTML = '<option value="">コンテスト対象アンケートがありません</option>';
      return;
    }
    // 新しい順に並べる
    contests.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
    sel.innerHTML = '<option value="">コンテストを選択してください...</option>' +
      contests.map((s, i) => `<option value="${esc(s.id)}">${esc(s.title)}${s.active ? '' : ' （非公開）'}</option>`).join('');
  } catch (e) { showError('コンテスト一覧の取得に失敗しました: ' + e.message); }
}

async function onContestChange() {
  const sel = document.getElementById('contestSelect');
  const surveyId = sel.value;
  if (!surveyId) {
    document.getElementById('noContestMsg').style.display = 'block';
    document.getElementById('dataArea').style.display = 'none';
    document.getElementById('contestBadge').style.display = 'none';
    document.getElementById('csvBtn').style.display = 'none';
    document.getElementById('refreshBtn').style.display = 'none';
    currentContest = null;
    return;
  }
  // 選択されたコンテスト情報
  currentContest = { id: surveyId, title: sel.options[sel.selectedIndex].text };
  const badge = document.getElementById('contestBadge');
  badge.textContent = '🏆 ' + currentContest.title;
  badge.style.display = 'inline-block';
  document.getElementById('csvBtn').style.display = 'inline-block';
  document.getElementById('refreshBtn').style.display = 'inline-block';
  document.getElementById('noContestMsg').style.display = 'none';
  document.getElementById('dataArea').style.display = 'block';
  await loadResponses();
}

// ============================================================
// 回答データ取得
// ============================================================
let questionLabelMap = {}; // { q_XXXXXXXXX: '氏名' } のマップ

async function loadResponses() {
  if (!currentContest) return;
  const btn = document.getElementById('refreshBtn');
  btn.textContent = '⏳ 読込中...';
  btn.disabled = true;
  try {
    const headers = adminToken ? { 'x-admin-token': adminToken } : {};

    // アンケート定義と回答データを並行取得
    const [surveyRes, responseRes] = await Promise.all([
      fetch(BASE_URL + '/api/surveys?tenant=' + TENANT + '&id=' + currentContest.id, { headers }),
      fetch(BASE_URL + '/api/response?surveyId=' + currentContest.id + '&tenant=' + TENANT, { headers })
    ]);

    // 質問ラベルマップを構築
    questionLabelMap = {};
    if (surveyRes.ok) {
      const survey = await surveyRes.json();
      (survey.questions || []).forEach(q => {
        if (q.id && q.label) questionLabelMap[q.id] = q.label;
      });
    }

    if (!responseRes.ok) throw new Error('HTTP ' + responseRes.status);
    const data = await responseRes.json();
    allResponses = (data || []).map(r => ({ ...r, measure: null }));

    // PostgreSQL接続済みなら採寸データ付加
    if (dbConnected) await enrichWithMeasure();

    document.getElementById('lastUpdated').textContent = new Date().toLocaleTimeString('ja-JP');
    updateSummary();
    applyFilter();
  } catch (e) { showError('データ取得に失敗しました: ' + e.message); }
  btn.textContent = '🔄 更新';
  btn.disabled = false;
}

// 採寸データ付加（PostgreSQL接続後に実装）
async function enrichWithMeasure() {
  for (const r of allResponses) {
    const salonCode = getAnswerByKey(r, ['サロンコード']);
    const dianaCode = getAnswerByKey(r, ['ダイアナコード', 'diana_cd']);
    const bday      = getAnswerByKey(r, ['生年月日', '生年', '誕生']);
    if (!salonCode && !dianaCode) continue;
    try {
      const res = await fetch(BASE_URL + '/api/diana-member', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-token': adminToken || '' },
        body: JSON.stringify({ sldsslcd: salonCode, dia_cd: dianaCode, b_day: bday })
      });
      if (res.ok) r.measure = await res.json();
    } catch (e) { /* silent */ }
  }
}

// ============================================================
// アンケート回答から値を取得するヘルパー
// ============================================================
function getAnswerByKey(r, keywords) {
  const answers = r.answers || {};
  for (const [k, v] of Object.entries(answers)) {
    if (keywords.some(kw => k.includes(kw))) return typeof v === 'object' ? (v.value || '') : String(v);
  }
  return '';
}

function getAnswerEntries(r) {
  const answers = r.answers || {};
  return Object.entries(answers)
    .filter(([k, v]) => {
      // 画像パスは応募内容から除外（応募写真セクションで表示）
      if (typeof v === 'string' && isBlobPath(v)) return false;
      if (typeof v === 'string' && /\.(png|jpg|jpeg|gif|webp)/i.test(v)) return false;
      return true;
    })
    .map(([k, v]) => {
      const label = questionLabelMap[k] || k;
      const value = typeof v === 'object' && v !== null ? JSON.stringify(v) : String(v || '');
      return { key: label, rawKey: k, value };
    });
}

// Blob Storageのパスかどうか判定
function isBlobPath(v) {
  if (typeof v !== 'string' || !v) return false;
  if (v.startsWith('https://stdstylesurveyfiles')) return true;
  // diana/ で始まる相対パス（画像ファイルを含む）
  if (v.startsWith('diana/') || v.startsWith('herbelle/') || v.startsWith('dstylehd/')) return true;
  return false;
}

// 画像かどうか判定（拡張子ベース）
function isImagePath(v) {
  if (typeof v !== 'string' || !v) return false;
  return /\.(png|jpg|jpeg|gif|webp|PNG|JPG|JPEG|GIF|WEBP)$/.test(v.split('?')[0]);
}

// Blob StorageのパスからSAS URL取得（filedownloadエンドポイント使用）
async function getBlobUrl(blobPath) {
  try {
    const res = await fetch(BASE_URL + '/api/filedownload?blobName=' + encodeURIComponent(blobPath) + '&tenant=' + TENANT, {
      headers: adminToken ? { 'x-admin-token': adminToken } : {}
    });
    if (res.ok) { const d = await res.json(); return d.downloadUrl || null; }
  } catch(e) {}
  return null;
}

// 画像URLリストを取得（Blobパス→SAS URL変換済み）
async function getImageUrls(r) {
  const answers = r.answers || {};
  const urls = [];
  for (const [k, v] of Object.entries(answers)) {
    const label = questionLabelMap[k] || k;
    if (typeof v === 'string' && isBlobPath(v)) {
      // Blob相対パス → SAS URL取得
      const url = v.startsWith('https://') ? v : await getBlobUrl(v);
      if (url) urls.push({ label, blobName: v, url });
    } else if (typeof v === 'string' && isBlobPath(v) && isImagePath(v)) {
      const url = await getBlobUrl(v);
      if (url) urls.push({ label, blobName: v, url });
    } else if (typeof v === 'string' && v.startsWith('https://') && isImagePath(v)) {
      urls.push({ label, blobName: null, url: v });
    } else if (typeof v === 'object' && v !== null && !Array.isArray(v) && v.url) {
      urls.push({ label, blobName: null, url: v.url });
    } else if (Array.isArray(v)) {
      for (const item of v) {
        if (item && item.url) urls.push({ label, blobName: null, url: item.url });
      }
    }
  }
  return urls;
}

// 画像ダウンロード
async function downloadImage(blobName, label) {
  try {
    let url;
    if (blobName) {
      const res = await fetch(BASE_URL + '/api/filedownload?blobName=' + encodeURIComponent(blobName) + '&tenant=' + TENANT, {
        headers: adminToken ? { 'x-admin-token': adminToken } : {}
      });
      if (res.ok) { const d = await res.json(); url = d.downloadUrl; }
    }
    if (!url) { alert('ダウンロードURLを取得できませんでした'); return; }

    // SASのURLはクロスオリジンのためdownload属性が効かないので
    // fetchでバイナリ取得→BlobURL経由で強制ダウンロード
    const imgRes = await fetch(url);
    if (!imgRes.ok) throw new Error('画像取得失敗');
    const blob = await imgRes.blob();
    const blobUrl = URL.createObjectURL(blob);

    // ファイル名を取得（元のパスの末尾）
    const fileName = label || blobName.split('/').pop() || 'image';

    const a = document.createElement('a');
    a.href = blobUrl;
    a.download = fileName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
  } catch(e) { alert('ダウンロードに失敗しました: ' + e.message); }
}

// ============================================================
// フィルター・表示
// ============================================================
async function applyFilter() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase();
  filteredResponses = allResponses.filter(r => {
    if (!q) return true;
    return JSON.stringify(r.answers).toLowerCase().includes(q);
  });
  currentPage = 1;
  document.getElementById('filterCount').textContent = q ? filteredResponses.length + '件該当' : '';
  await renderGrid();
}

function clearSearch() {
  document.getElementById('searchInput').value = '';
  applyFilter();
}

async function renderGrid() {
  const grid = document.getElementById('applicantGrid');
  if (filteredResponses.length === 0) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-icon">🔍</div><p>' + (allResponses.length === 0 ? '応募データがありません' : '検索結果がありません') + '</p></div>';
    document.getElementById('pagination').style.display = 'none';
    return;
  }
  const start = (currentPage - 1) * PAGE_SIZE;
  const pageData = filteredResponses.slice(start, start + PAGE_SIZE);
  const globalStart = start; // グリッドインデックス → filteredResponses のインデックス

  const cardHtmlList = [];
  for (let localIdx = 0; localIdx < pageData.length; localIdx++) {
    const r = pageData[localIdx];
    const idx = globalStart + localIdx;
    const name    = esc(getAnswerByKey(r, ['応募者氏名', '氏名', '名前', 'お名前']) || '（氏名なし）');
    const kana    = esc(getAnswerByKey(r, ['ふりがな', 'フリガナ', 'カナ', 'かな']));
    const salon   = esc(getAnswerByKey(r, ['サロンコード']));
    const diana   = esc(getAnswerByKey(r, ['ダイアナコード', 'diana_cd']));
    const bday    = esc(getAnswerByKey(r, ['生年月日', '応募者 生年月日']));
    const date    = r.createdAt ? new Date(r.createdAt).toLocaleDateString('ja-JP') : '-';
    const imgs    = await getImageUrls(r);
    const hasMeasure = r.measure && r.measure.diag_dt;
    cardHtmlList.push(`<div class="applicant-card ${hasMeasure ? 'has-measure' : ''}" onclick="showDetail(${idx})">
      <div class="card-header">
        <div class="card-num">No.${idx + 1}</div>
        <div class="card-name">${name}</div>
        ${kana ? '<div class="card-kana">' + kana + '</div>' : ''}
      </div>
      <div class="card-body">
        <div class="card-row"><span class="key">サロンコード</span><span class="val">${salon || '-'}</span></div>
        <div class="card-row"><span class="key">ダイアナコード</span><span class="val">${diana || '-'}</span></div>
        <div class="card-row"><span class="key">生年月日</span><span class="val">${bday || '-'}</span></div>
        ${hasMeasure ? `<div class="card-row"><span class="key">採寸日</span><span class="val">${esc(r.measure.diag_dt)}</span></div>` : ''}
        ${imgs.length > 0 ? `<div class="img-thumb-row">${imgs.slice(0,3).map(img => `<img class="img-thumb" src="${esc(img.url)}" alt="${esc(img.label)}" onclick="event.stopPropagation();openLightbox('${esc(img.url)}')">`).join('')}${imgs.length > 3 ? `<span style="font-size:11px;color:#aaa;align-self:center;">+${imgs.length-3}</span>` : ''}</div>` : ''}
      </div>
      <div class="card-footer">
        <span class="card-date">📅 ${date}</span>
        <span>${hasMeasure ? '<span class="measure-chip">✅ 採寸済</span>' : '<span class="no-measure-chip">📋 ' + (dbConnected ? 'DB照合なし' : 'DB未接続') + '</span>'}</span>
        <span class="card-arrow">›</span>
      </div>
    </div>`);
  }
  grid.innerHTML = cardHtmlList.join('');

  renderPagination(filteredResponses.length);
}

function renderPagination(total) {
  const totalPages = Math.ceil(total / PAGE_SIZE);
  const pag = document.getElementById('pagination');
  if (totalPages <= 1) { pag.style.display = 'none'; return; }
  pag.style.display = 'flex';
  let html = `<button class="page-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>＜</button>`;
  for (let i = 1; i <= totalPages; i++) {
    if (i===1||i===totalPages||Math.abs(i-currentPage)<=1) html += `<button class="page-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
    else if (Math.abs(i-currentPage)===2) html += '<span class="page-info">…</span>';
  }
  html += `<button class="page-btn" onclick="goPage(${currentPage+1})" ${currentPage===totalPages?'disabled':''}>＞</button>`;
  html += `<span class="page-info">${total}名中 ${(currentPage-1)*PAGE_SIZE+1}〜${Math.min(currentPage*PAGE_SIZE,total)}名</span>`;
  pag.innerHTML = html;
}

async function goPage(p) {
  const totalPages = Math.ceil(filteredResponses.length / PAGE_SIZE);
  if (p<1||p>totalPages) return;
  currentPage = p;
  await renderGrid();
  document.getElementById('dataArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ============================================================
// サマリー
// ============================================================
function updateSummary() {
  document.getElementById('totalCount').textContent = allResponses.length;
  document.getElementById('matchedCount').textContent = allResponses.filter(r => r.measure && r.measure.diag_dt).length;
}

// ============================================================
// 詳細モーダル
// ============================================================
function showDetail(idx) {
  currentDetailIndex = idx;
  renderModal();
  document.getElementById('detailModal').classList.add('show');
}

async function renderModal() {
  const r = filteredResponses[currentDetailIndex];
  if (!r) return;

  const total = filteredResponses.length;
  const name  = getAnswerByKey(r, ['氏名','名前','お名前']) || '（氏名なし）';
  const kana  = getAnswerByKey(r, ['カナ','かな','フリガナ']);

  document.getElementById('modalSubtitle').textContent = `${currentDetailIndex + 1} / ${total}`;
  document.getElementById('modalName').textContent = name;
  document.getElementById('modalKana').textContent = kana;
  document.getElementById('prevBtn').disabled = currentDetailIndex === 0;
  document.getElementById('nextBtn').disabled = currentDetailIndex === total - 1;

  const m = r.measure;
  const imgs = await getImageUrls(r);
  const entries = getAnswerEntries(r);

  // 回答内容
  const answerHtml = entries.map(e =>
    `<div class="answer-item"><div class="answer-lbl">${esc(e.key)}</div><div class="answer-val">${esc(e.value)}</div></div>`
  ).join('');

  // 採寸データ
  const measureHtml = m && m.diag_dt ? `
    <div style="font-size:12px;color:#888;margin-bottom:12px;">📅 採寸日：${esc(m.diag_dt)}</div>
    <div class="measure-grid">
      ${mBlock('身長', m.calc_height, 'cm')}
      ${mBlock('体重', m.weight, 'kg')}
      ${mBlock('BMI', m.bmi, '')}
      ${mBlock('PI', m.pi, '')}
      ${mBlock('バスト（上）', m.top_bust, 'cm')}
      ${mBlock('アンダーバスト', m.under_bust, 'cm')}
      ${mBlock('ウエスト', m.waist, 'cm')}
      ${mBlock('中ヒップ', m.mid_hip, 'cm')}
      ${mBlock('ヒップ', m.hip, 'cm')}
      ${mBlock('太もも（左）', m.left_thigh, 'cm')}
      ${mBlock('太もも（右）', m.right_thigh, 'cm')}
      ${mBlock('体脂肪率', m.fat_pctg, '%')}
    </div>
    <div class="size-grid" style="margin-top:14px;">
      <div class="size-block"><div class="size-lbl">ブラサイズ</div><div class="size-val">${esc(m.bra_sz||'-')}</div></div>
      <div class="size-block"><div class="size-lbl">コルセット</div><div class="size-val">${esc(m.corset_sz||'-')}</div></div>
      <div class="size-block"><div class="size-lbl">ボディスーツ</div><div class="size-val">${esc(m.body_suit_sz||'-')}</div></div>
    </div>
  ` : '<div style="padding:20px 16px;">' + (dbConnected
      ? '<div style="display:flex;align-items:center;gap:10px;background:#fff3e0;border:1.5px solid #ffb74d;border-radius:10px;padding:14px 18px;">'  +
          '<span style="font-size:24px;">⚠️</span>' +
          '<div><div style="font-weight:bold;color:#e65100;font-size:14px;margin-bottom:2px;">照合データなし</div>' +
          '<div style="font-size:12px;color:#bf360c;">ダイアナコード・サロンコードが一致するデータが見つかりませんでした。</div></div></div>'
      : '<div style="display:flex;align-items:flex-start;gap:12px;background:#f3f0ff;border:1.5px solid #9c8fd4;border-radius:10px;padding:16px 18px;">' +
          '<span style="font-size:28px;flex-shrink:0;">🔗</span>' +
          '<div><div style="font-weight:bold;color:#4527a0;font-size:15px;margin-bottom:6px;">採寸データ 未接続</div>' +
          '<div style="font-size:13px;color:#5e35b1;line-height:1.8;">PostgreSQL接続設定後にダイアナコードと照合して自動表示されます。</div></div></div>'
    ) + '</div>';

  // 理想値
  const idealHtml = `<div class="coming-soon">理想値カラムは今後追加予定です</div>`;

  // 画像ギャラリー（ダウンロードボタン付き）
  const galleryHtml = imgs.length > 0
    ? '<div class="img-gallery">' + imgs.map(img => {
        const safeUrl = esc(img.url);
        const safeLabel = esc(img.label);
        const safeBlobName = img.blobName ? esc(img.blobName) : '';
        return `<div class="img-gallery-item">
          <img src="${safeUrl}" alt="${safeLabel}" loading="lazy" onclick="openLightbox('${safeUrl}')">
          <div class="img-gallery-overlay">
            <div class="img-gallery-label">${safeLabel}</div>
            <div class="img-action-row">
              <button class="img-action-btn" onclick="event.stopPropagation();openLightbox('${safeUrl}')">🔍 拡大</button>
              <button class="img-action-btn" onclick="event.stopPropagation();downloadImage('${safeBlobName}','${safeLabel}')">⬇️ DL</button>
            </div>
          </div>
        </div>`;
      }).join('') + '</div>'
    : '<div class="no-image">添付画像なし</div>';

  document.getElementById('modalBody').innerHTML = `
    <div class="detail-section">
      <div class="detail-section-header">📋 応募内容
        <span style="font-weight:normal;font-size:11px;color:#aaa;margin-left:auto;">応募日時：${r.createdAt ? new Date(r.createdAt).toLocaleString('ja-JP') : '-'}</span>
      </div>
      <div class="detail-section-body"><div class="answer-grid">${answerHtml}</div></div>
    </div>
    <div class="detail-section">
      <div class="detail-section-header">📐 初回採寸データ（DB自動取得）</div>
      <div class="detail-section-body">${measureHtml}</div>
    </div>
    <div class="detail-section">
      <div class="detail-section-header">🎯 理想値</div>
      <div class="detail-section-body">${idealHtml}</div>
    </div>
    <div class="detail-section">
      <div class="detail-section-header">🖼️ 応募写真</div>
      <div class="detail-section-body">${galleryHtml}</div>
    </div>
  `;
}

function mBlock(label, val, unit) {
  const hasVal = val !== null && val !== undefined && val !== 0 && val !== '';
  return `<div class="measure-block">
    <div class="m-lbl">${label}</div>
    <div class="m-val">${hasVal ? esc(val) + '<span class="m-unit">' + unit + '</span>' : '<span style="color:#ccc;font-size:14px;">-</span>'}</div>
  </div>`;
}

function navigate(dir) {
  const newIdx = currentDetailIndex + dir;
  if (newIdx < 0 || newIdx >= filteredResponses.length) return;
  currentDetailIndex = newIdx;
  renderModal();
  document.getElementById('modalBody').scrollTop = 0;
}

function closeModal() { document.getElementById('detailModal').classList.remove('show'); }
function onOverlayClick(e) { if (e.target === document.getElementById('detailModal')) closeModal(); }

// キーボードナビ
document.addEventListener('keydown', e => {
  if (!document.getElementById('detailModal').classList.contains('show')) return;
  if (e.key === 'ArrowLeft') navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
  if (e.key === 'Escape') closeModal();
});

// ============================================================
// ライトボックス
// ============================================================
function openLightbox(url) {
  document.getElementById('lightboxImg').src = url;
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox() { document.getElementById('lightbox').classList.remove('show'); }

// ============================================================
// CSV出力
// ============================================================

// 個人CSV（モーダルで表示中の1名分）
function downloadSingleCSV() {
  const r = filteredResponses[currentDetailIndex];
  if (!r) return;

  const answerKeys = Object.keys(r.answers || {});
  const answerLabels = answerKeys.map(k => questionLabelMap[k] || k);
  const m = r.measure || {};

  const headers = [
    'No.', '応募日時',
    ...answerLabels,
    '採寸日', '身長(cm)', '体重(kg)', 'トップバスト(cm)', 'アンダーバスト(cm)',
    'ウエスト(cm)', '中ヒップ(cm)', 'ヒップ(cm)', '太もも左(cm)', '太もも右(cm)',
    '体脂肪率(%)', 'BMI', 'PI', 'ブラサイズ', 'コルセットサイズ', 'ボディスーツサイズ',
    'ダイアナ歴(年)', 'ボディチェック総回数',
    '理想体重', '理想ウエスト', '理想ヒップ'
  ];

  const row = [
    currentDetailIndex + 1,
    r.createdAt ? new Date(r.createdAt).toLocaleString('ja-JP') : '',
    ...answerKeys.map(k => {
      const v = (r.answers||{})[k];
      if (typeof v === 'string' && v.includes('/') && /\.(png|jpg|jpeg|gif|webp)/i.test(v)) return v.split('/').pop();
      return typeof v === 'object' ? JSON.stringify(v) : String(v||'');
    }),
    m.diag_dt||'', m.calc_height||'', m.weight||'',
    m.top_bust||'', m.under_bust||'',
    m.waist||'', m.mid_hip||'', m.hip||'',
    m.left_thigh||'', m.right_thigh||'',
    m.fat_pctg||'', m.bmi||'', m.pi||'',
    m.bra_sz||'', m.corset_sz||'', m.body_suit_sz||'',
    m.diana_years||'', m.total_body_check||'',
    '', '', ''
  ];

  const name = getAnswerByKey(r, ['氏名','名前','お名前']) || '応募者';
  const bom = '\uFEFF';
  const csv = bom + [headers, row].map(r => r.map(v => '"' + String(v||'').replace(/"/g,'""') + '"').join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
  a.download = 'diana_' + name + '_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

function downloadCSV() {
  if (filteredResponses.length === 0) { alert('データがありません'); return; }

  // 全回答に存在するキーを収集（順序保持）
  const answerKeys = [...new Set(filteredResponses.flatMap(r => Object.keys(r.answers || {})))];

  // questionLabelMapで日本語ラベルに変換（なければIDのまま）
  const answerLabels = answerKeys.map(k => questionLabelMap[k] || k);

  // ヘッダー行（日本語）
  const headers = [
    'No.', '応募日時',
    ...answerLabels,
    '採寸日', '身長(cm)', '体重(kg)', 'トップバスト(cm)', 'アンダーバスト(cm)',
    'ウエスト(cm)', '中ヒップ(cm)', 'ヒップ(cm)', '太もも左(cm)', '太もも右(cm)',
    '体脂肪率(%)', 'BMI', 'PI', 'ブラサイズ', 'コルセットサイズ', 'ボディスーツサイズ',
    'ダイアナ歴(年)', 'ボディチェック総回数',
    '理想体重', '理想ウエスト', '理想ヒップ'
  ];

  const rows = filteredResponses.map((r, i) => {
    const m = r.measure || {};
    return [
      i + 1,
      r.createdAt ? new Date(r.createdAt).toLocaleString('ja-JP') : '',
      // アンケート回答（画像パスは除外してファイル名だけ）
      ...answerKeys.map(k => {
        const v = (r.answers||{})[k];
        if (typeof v === 'string' && v.includes('/') && /\.(png|jpg|jpeg|gif|webp)/i.test(v)) {
          return v.split('/').pop(); // ファイル名のみ
        }
        return typeof v === 'object' ? JSON.stringify(v) : String(v||'');
      }),
      // 採寸データ
      m.diag_dt||'', m.calc_height||'', m.weight||'',
      m.top_bust||'', m.under_bust||'',
      m.waist||'', m.mid_hip||'', m.hip||'',
      m.left_thigh||'', m.right_thigh||'',
      m.fat_pctg||'', m.bmi||'', m.pi||'',
      m.bra_sz||'', m.corset_sz||'', m.body_suit_sz||'',
      m.diana_years||'', m.total_body_check||'',
      '', '', '' // 理想値（将来）
    ];
  });

  const bom = '\uFEFF';
  const csv = bom + [headers, ...rows]
    .map(r => r.map(v => '"' + String(v||'').replace(/"/g, '""') + '"').join(','))
    .join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
  a.download = 'diana_contest_' + (currentContest ? currentContest.title.replace(/\s/g,'_') : '') + '_' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}

function hideLoading()      { document.getElementById('loadingScreen').style.display = 'none'; }
function setLoadingText(t)  { document.querySelector('#loadingScreen .loading-text').textContent = t; }
function showLogin()        { hideLoading(); document.getElementById('loginScreen').classList.add('show'); document.getElementById('mainScreen').classList.remove('show'); }
function showMain()         { document.getElementById('loginScreen').classList.remove('show'); document.getElementById('mainScreen').classList.add('show'); }
function showLoginError(m)  { const el = document.getElementById('loginError'); el.innerHTML = m; el.style.display = 'block'; }
function showError(m)       { const el = document.getElementById('errorBanner'); el.textContent = m; el.style.display = 'block'; setTimeout(() => el.style.display = 'none', 8000); }

function updateDbStatus(connected) {
  dbConnected = connected;
  const el = document.getElementById('dbStatus');
  el.className = 'db-status ' + (connected ? 'connected' : 'disconnected');
  el.innerHTML = `<div class="db-dot"></div>${connected ? '採寸DB 接続済' : '採寸DB 未接続'}`;
}

initMsal();
