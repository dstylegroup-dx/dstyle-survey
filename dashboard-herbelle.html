<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Herbelle ダッシュボード</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f5f7f5; color: #333; }
    .login-wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
    .login-box { background: white; border-radius: 12px; padding: 40px 32px; width: 100%; max-width: 380px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
    .login-box h2 { color: #4A5D4E; margin-bottom: 24px; font-size: 22px; }
    .login-box input { width: 100%; padding: 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 16px; text-align: center; }
    .login-box button { width: 100%; padding: 14px; background: #4A5D4E; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
    .login-box button:hover { background: #3b4d3f; }
    .login-error { color: #c0392b; font-size: 14px; margin-top: 10px; display: none; }
    #dashContent { display: none; }
    .topbar { background: #4A5D4E; color: white; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .topbar h1 { font-size: 18px; white-space: nowrap; }
    .topbar-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .topbar select { padding: 8px 12px; border-radius: 6px; border: none; font-size: 14px; background: rgba(255,255,255,0.9); color: #333; min-width: 200px; }
    .topbar .logout { background: rgba(255,255,255,0.2); border: none; color: white; padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 14px; white-space: nowrap; }
    .main { padding: 24px; max-width: 1200px; margin: 0 auto; }
    .tabs { display: flex; gap: 4px; margin-bottom: 24px; border-bottom: 2px solid #ddd; }
    .tab-btn { padding: 10px 20px; border: none; background: none; font-size: 14px; font-weight: bold; color: #888; cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; }
    .tab-btn.active { color: #4A5D4E; border-bottom-color: #4A5D4E; }
    .tab-btn:hover { color: #4A5D4E; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .panel { background: white; border-radius: 10px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px; }
    .panel h2 { font-size: 16px; color: #4A5D4E; margin-bottom: 16px; font-weight: bold; }
    .btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: #4A5D4E; color: white; }
    .btn-primary:hover { background: #3b4d3f; }
    .btn-success { background: #27ae60; color: white; }
    .btn-success:hover { background: #219a52; }
    .btn-danger { background: #e74c3c; color: white; }
    .btn-danger:hover { background: #c0392b; }
    .btn-secondary { background: #f5f5f5; color: #666; border: 1px solid #ddd; }
    .btn-secondary:hover { background: #eee; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .survey-list { display: flex; flex-direction: column; gap: 12px; }
    .survey-item { border: 1.5px solid #ddd; border-radius: 8px; padding: 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; background: #fafafa; }
    .survey-item:hover { border-color: #4A5D4E; background: #f0f4f0; }
    .survey-item-info { flex: 1; }
    .survey-item-title { font-weight: bold; font-size: 15px; color: #333; }
    .survey-item-meta { font-size: 12px; color: #888; margin-top: 4px; }
    .survey-item-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .builder-form { display: flex; flex-direction: column; gap: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-size: 13px; font-weight: bold; color: #555; }
    .form-group input, .form-group textarea, .form-group select { padding: 10px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 15px; background: #fafafa; -webkit-appearance: none; appearance: none; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: #4A5D4E; outline: none; background: #fff; }
    .form-group textarea { height: 80px; resize: vertical; }
    .questions-list { display: flex; flex-direction: column; gap: 12px; }
    .question-item { border: 1.5px solid #ddd; border-radius: 8px; padding: 16px; background: #fafafa; }
    .question-item-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; }
    .question-num { background: #4A5D4E; color: white; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 12px; flex-shrink: 0; }
    .question-type-badge { background: #e8f5e9; color: #2e7d32; padding: 3px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; }
    .question-label-text { flex: 1; font-weight: bold; font-size: 14px; }
    .question-actions { display: flex; gap: 6px; margin-left: auto; }
    .options-list { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .option-tag { background: #f0f4f0; border: 1px solid #c8d8c8; padding: 4px 10px; border-radius: 20px; font-size: 13px; color: #4A5D4E; }
    .add-question-bar { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; padding: 16px; border: 2px dashed #ddd; border-radius: 8px; background: #fafafa; }
    .add-question-bar select { flex: 1; min-width: 160px; padding: 8px 12px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 14px; }
    .period-form { display: flex; gap: 16px; align-items: flex-end; flex-wrap: wrap; }
    .period-field { display: flex; flex-direction: column; gap: 6px; }
    .period-field label { font-size: 13px; color: #888; font-weight: bold; }
    .period-field input[type="date"] { padding: 10px 14px; border: 1.5px solid #ddd; border-radius: 8px; font-size: 15px; background: #fafafa; cursor: pointer; }
    .period-field input[type="date"]:focus { border-color: #4A5D4E; outline: none; }
    .period-status { font-size: 13px; margin-top: 10px; padding: 8px 12px; border-radius: 6px; display: none; }
    .period-status.success { background: #e8f5e9; color: #2e7d32; display: block; }
    .period-status.error { background: #fce8e6; color: #c62828; display: block; }
    .current-period { font-size: 13px; color: #666; margin-top: 8px; }
    .current-period span { font-weight: bold; color: #4A5D4E; }
    .summary { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 16px; margin-bottom: 20px; }
    .card { background: white; border-radius: 10px; padding: 16px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
    .card .num { font-size: 28px; font-weight: bold; color: #4A5D4E; }
    .card .label { font-size: 12px; color: #888; margin-top: 4px; }
    .card.hl { border-left: 4px solid #4A5D4E; }
    .toolbar { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
    .table-wrap { background: white; border-radius: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow: hidden; }
    .table-scroll { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { background: #4A5D4E; color: white; padding: 12px; text-align: left; white-space: nowrap; }
    td { padding: 10px 12px; border-bottom: 1px solid #f0f0f0; vertical-align: top; font-size: 13px; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #f9fbf9; }
    .btn-delete-sm { background: none; border: 1px solid #ddd; color: #999; padding: 3px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }
    .btn-delete-sm:hover { border-color: #e74c3c; color: #e74c3c; }
    .empty { text-align: center; padding: 40px; color: #888; }
    .loading { text-align: center; padding: 30px; color: #888; }
    .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 1000; display: none; align-items: center; justify-content: center; padding: 20px; }
    .modal-overlay.show { display: flex; }
    .modal { background: white; border-radius: 12px; padding: 28px; width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
    .modal h2 { font-size: 18px; color: #4A5D4E; margin-bottom: 20px; }
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
    .options-input-area { display: flex; flex-direction: column; gap: 8px; margin-top: 8px; }
    .option-row { display: flex; gap: 8px; align-items: center; }
    .option-row input { flex: 1; padding: 8px 12px; border: 1.5px solid #ddd; border-radius: 6px; font-size: 14px; }
    .option-row button { background: none; border: 1px solid #ddd; color: #999; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .option-row button:hover { border-color: #e74c3c; color: #e74c3c; }
    .add-option-btn { background: #f0f4f0; border: 1.5px dashed #4A5D4E; color: #4A5D4E; padding: 8px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: bold; }
    .survey-url-box { background: #f0f4f0; border-radius: 8px; padding: 12px 16px; font-size: 13px; color: #4A5D4E; word-break: break-all; margin-top: 8px; }
    .status-msg { padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-top: 10px; display: none; }
    .status-msg.success { background: #e8f5e9; color: #2e7d32; display: block; }
    .status-msg.error { background: #fce8e6; color: #c62828; display: block; }
  </style>
</head>
<body>

<div class="login-wrap" id="loginArea">
  <div class="login-box">
    <h2>🌿 Herbelle ダッシュボード</h2>
    <input type="password" id="passwordInput" placeholder="パスワードを入力">
    <button onclick="doLogin()">ログイン</button>
    <div class="login-error" id="loginError">⚠️ パスワードが違います</div>
  </div>
</div>

<div id="dashContent">
  <div class="topbar">
    <h1>🌿 Herbelle ダッシュボード</h1>
    <div class="topbar-right">
      <select id="surveySelect" onchange="onSurveyChange()">
        <option value="">アンケートを選択...</option>
      </select>
      <button class="logout" onclick="doLogout()">ログアウト</button>
    </div>
  </div>
  <div class="main">
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('responses')">📊 回答データ</button>
      <button class="tab-btn" onclick="switchTab('builder')">⚙️ アンケート設定</button>
      <button class="tab-btn" onclick="switchTab('surveys')">📋 アンケート管理</button>
    </div>

    <div id="tab-responses" class="tab-content active">
      <div id="noSurveyMsg" class="panel" style="text-align:center;color:#888;">上のドロップダウンからアンケートを選択してください</div>
      <div id="responseContent" style="display:none">
        <div class="panel">
          <h2>📅 受付期間の設定</h2>
          <div class="period-form">
            <div class="period-field"><label>開始日</label><input type="date" id="startDateInput"></div>
            <div class="period-field"><label>終了日</label><input type="date" id="endDateInput"></div>
            <button class="btn btn-primary" onclick="savePeriod()">💾 保存</button>
            <button class="btn btn-secondary" onclick="clearPeriod()">🗑️ 削除</button>
          </div>
          <div class="current-period" id="currentPeriod">読み込み中...</div>
          <div class="period-status" id="periodStatus"></div>
        </div>
        <div class="summary" id="summaryArea"></div>
        <div class="toolbar">
          <button class="btn btn-primary" onclick="fetchResponses()">🔄 更新</button>
          <button class="btn btn-success" onclick="downloadCSV()">📥 CSVダウンロード</button>
        </div>
        <div class="table-wrap">
          <div class="table-scroll">
            <table>
              <thead id="tableHead"></thead>
              <tbody id="tableBody"><tr><td class="loading">アンケートを選択してください</td></tr></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <div id="tab-builder" class="tab-content">
      <div id="noSurveyMsg2" class="panel" style="text-align:center;color:#888;">上のドロップダウンからアンケートを選択してください</div>
      <div id="builderContent" style="display:none">
        <div class="panel">
          <h2>📝 基本情報</h2>
          <div class="builder-form">
            <div class="form-group"><label>アンケートタイトル</label><input type="text" id="surveyTitle" placeholder="例）無料体験アンケート"></div>
            <div class="form-group"><label>説明文（任意）</label><textarea id="surveyDescription" placeholder="例）本日はお越しいただきありがとうございました。率直なご感想をお聞かせください（約2分）"></textarea></div>
            <div style="display:flex;gap:10px;flex-wrap:wrap">
              <button class="btn btn-primary" onclick="saveSurveyInfo()">💾 基本情報を保存</button>
              <div class="status-msg" id="infoStatus"></div>
            </div>
          </div>
        </div>
        <div class="panel">
          <h2>❓ 質問一覧</h2>
          <div class="questions-list" id="questionsList"></div>
          <div style="margin-top:16px">
            <div class="add-question-bar">
              <span style="font-size:14px;font-weight:bold;color:#555">質問を追加：</span>
              <select id="newQuestionType">
                <option value="text">テキスト入力</option>
                <option value="textarea">長文テキスト</option>
                <option value="radio">ラジオボタン（単一選択）</option>
                <option value="checkbox">チェックボックス（複数選択）</option>
                <option value="select">プルダウン</option>
              </select>
              <button class="btn btn-primary" onclick="openAddQuestion()">＋ 追加</button>
            </div>
          </div>
          <div style="margin-top:16px">
            <button class="btn btn-success" onclick="saveQuestions()">💾 質問を保存</button>
            <div class="status-msg" id="questionsStatus" style="display:inline-block;margin-left:10px"></div>
          </div>
        </div>
        <div class="panel">
          <h2>🔗 アンケートURL</h2>
          <p style="font-size:13px;color:#666;margin-bottom:8px">お客様に共有するURLです：</p>
          <div class="survey-url-box" id="surveyUrlBox">—</div>
          <button class="btn btn-secondary btn-sm" style="margin-top:8px" onclick="copyUrl()">📋 URLをコピー</button>
        </div>
      </div>
    </div>

    <div id="tab-surveys" class="tab-content">
      <div class="panel">
        <h2>📋 アンケート一覧</h2>
        <div style="margin-bottom:16px"><button class="btn btn-primary" onclick="openCreateSurvey()">＋ 新規アンケート作成</button></div>
        <div class="survey-list" id="surveyList"><div class="loading">読み込み中...</div></div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="questionModal">
  <div class="modal">
    <h2 id="modalTitle">質問を追加</h2>
    <div class="builder-form">
      <div class="form-group"><label>質問文</label><input type="text" id="qLabel" placeholder="例）本日の満足度は？"></div>
      <div class="form-group">
        <label>回答形式</label>
        <select id="qType" onchange="onQTypeChange()">
          <option value="text">テキスト入力</option>
          <option value="textarea">長文テキスト</option>
          <option value="radio">ラジオボタン（単一選択）</option>
          <option value="checkbox">チェックボックス（複数選択）</option>
          <option value="select">プルダウン</option>
        </select>
      </div>
      <div class="form-group" id="placeholderGroup"><label>記入例（任意）</label><input type="text" id="qPlaceholder" placeholder="例）山田 花子"></div>
      <div class="form-group" id="qRequiredGroup">
        <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px;font-weight:normal">
          <input type="checkbox" id="qRequired" style="width:20px;height:20px;accent-color:#4A5D4E;flex-shrink:0;-webkit-appearance:checkbox;appearance:checkbox;border:2px solid #ddd;border-radius:4px;cursor:pointer">
          必須項目にする
        </label>
      </div>
      <div class="form-group" id="optionsGroup" style="display:none">
        <label>選択肢</label>
        <div class="options-input-area" id="optionsList"></div>
        <button class="add-option-btn" onclick="addOptionRow()">＋ 選択肢を追加</button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('questionModal')">キャンセル</button>
      <button class="btn btn-primary" onclick="saveQuestion()">保存</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="createSurveyModal">
  <div class="modal">
    <h2>新規アンケート作成</h2>
    <div class="builder-form">
      <div class="form-group"><label>アンケートタイトル</label><input type="text" id="newSurveyTitle" placeholder="例）無料体験アンケート"></div>
      <div class="form-group"><label>説明文（任意）</label><textarea id="newSurveyDescription" placeholder="例）本日はお越しいただきありがとうございました。"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" onclick="closeModal('createSurveyModal')">キャンセル</button>
      <button class="btn btn-primary" onclick="createSurvey()">作成</button>
    </div>
  </div>
</div>

<script>
  var TENANT = 'herbelle-chitosefunabashi';
  var BASE_URL = location.hostname === 'localhost'
    ? 'http://localhost:7071'
    : 'https://func-dstyle-survey-gab2dwg3gdcqecgz.japaneast-01.azurewebsites.net';

  var allSurveys = [];
  var currentSurvey = null;
  var allResponses = [];
  var editingQuestionIndex = -1;
  var responseAbortController = null; // ★これを追加

  async function doLogin() {
    var pw = document.getElementById('passwordInput').value;
    var loginError = document.getElementById('loginError');
    loginError.style.display = 'none';
    try {
      var res = await fetch(BASE_URL + '/api/auth', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pw, tenant: TENANT })
      });
      if (res.ok) {
        var data = await res.json();
        sessionStorage.setItem('adminToken', data.token);
        document.getElementById('loginArea').style.display = 'none';
        document.getElementById('dashContent').style.display = 'block';
        loadSurveys();
      } else {
        loginError.style.display = 'block';
      }
    } catch (e) { loginError.style.display = 'block'; }
  }

  document.getElementById('passwordInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') doLogin();
  });

  function doLogout() {
    sessionStorage.removeItem('adminToken');
    location.reload();
  }

  function token() { return sessionStorage.getItem('adminToken'); }

  function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
    document.querySelectorAll('.tab-content').forEach(function(c) { c.classList.remove('active'); });
    document.querySelector('[onclick="switchTab(\'' + name + '\')"]').classList.add('active');
    document.getElementById('tab-' + name).classList.add('active');
    if (name === 'surveys') renderSurveyList();
  }

  async function loadSurveys() {
    try {
      var res = await fetch(BASE_URL + '/api/surveys?tenant=' + TENANT);
      if (!res.ok) throw new Error('取得失敗');
      allSurveys = await res.json();
      var sel = document.getElementById('surveySelect');
      sel.innerHTML = '<option value="">アンケートを選択...</option>';
      allSurveys.forEach(function(s) {
        var opt = document.createElement('option');
        opt.value = s.id;
        opt.textContent = s.title;
        sel.appendChild(opt);
      });
    } catch (e) { console.error(e); }
  }

  function onSurveyChange() {
    var id = document.getElementById('surveySelect').value;
    if (!id) {
      currentSurvey = null;
      document.getElementById('noSurveyMsg').style.display = '';
      document.getElementById('responseContent').style.display = 'none';
      document.getElementById('noSurveyMsg2').style.display = '';
      document.getElementById('builderContent').style.display = 'none';
      return;
    }
    currentSurvey = allSurveys.find(function(s) { return s.id === id; });
    document.getElementById('noSurveyMsg').style.display = 'none';
    document.getElementById('responseContent').style.display = 'block';
    document.getElementById('noSurveyMsg2').style.display = 'none';
    document.getElementById('builderContent').style.display = 'block';
    loadBuilderData();
    fetchPeriod();
    fetchResponses();
  }

  function loadBuilderData() {
    if (!currentSurvey) return;
    document.getElementById('surveyTitle').value = currentSurvey.title || '';
    document.getElementById('surveyDescription').value = currentSurvey.description || '';
    renderQuestions();
    updateSurveyUrl();
  }

  function updateSurveyUrl() {
    if (!currentSurvey) return;
    var url = location.origin + '/survey.html?id=' + currentSurvey.id + '&tenant=' + TENANT;
    document.getElementById('surveyUrlBox').textContent = url;
  }

  function copyUrl() {
    var url = document.getElementById('surveyUrlBox').textContent;
    navigator.clipboard.writeText(url).then(function() { alert('URLをコピーしました！'); });
  }

  async function saveSurveyInfo() {
    if (!currentSurvey) return;
    var title = document.getElementById('surveyTitle').value.trim();
    var description = document.getElementById('surveyDescription').value.trim();
    if (!title) { alert('タイトルを入力してください'); return; }
    try {
      var res = await fetch(BASE_URL + '/api/surveys', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'x-admin-token': token() },
        body: JSON.stringify({ id: currentSurvey.id, tenant: TENANT, title: title, description: description })
      });
      if (res.status === 401) { doLogout(); return; }
      if (res.ok) {
        currentSurvey.title = title;
        currentSurvey.description = description;
        showStatus('infoStatus', '✅ 保存しました', 'success');
        loadSurveys();
      } else { showStatus('infoStatus', '❌ 保存失敗', 'error'); }
    } catch (e) { showStatus('infoStatus', '❌ エラー: ' + e.message, 'error'); }
  }

  function renderQuestions() {
    if (!currentSurvey) return;
    var list = document.getElementById('questionsList');
    var questions = currentSurvey.questions || [];
    if (questions.length === 0) {
      list.innerHTML = '<div class="empty">質問がありません。下の「＋ 追加」から追加してください。</div>';
      return;
    }
    var typeLabels = { text: 'テキスト', textarea: '長文', radio: 'ラジオ', checkbox: 'チェック', select: 'プルダウン' };
    list.innerHTML = questions.map(function(q, i) {
      var opts = (q.options || []).map(function(o) { return '<span class="option-tag">' + o + '</span>'; }).join('');
      return '<div class="question-item">' +
        '<div class="question-item-header">' +
        '<span class="question-num">' + (i+1) + '</span>' +
        '<span class="question-label-text">' + q.label + (q.required ? ' <span style="color:#c0392b;font-size:12px">※必須</span>' : '') + '</span>' +
        '<span class="question-type-badge">' + (typeLabels[q.type] || q.type) + '</span>' +
        '<div class="question-actions">' +
        '<button class="btn btn-secondary btn-sm" onclick="moveQuestion(' + i + ',-1)">↑</button>' +
        '<button class="btn btn-secondary btn-sm" onclick="moveQuestion(' + i + ',1)">↓</button>' +
        '<button class="btn btn-primary btn-sm" onclick="openEditQuestion(' + i + ')">編集</button>' +
        '<button class="btn btn-danger btn-sm" onclick="removeQuestion(' + i + ')">削除</button>' +
        '</div></div>' +
        (opts ? '<div class="options-list">' + opts + '</div>' : '') +
        '</div>';
    }).join('');
  }

  function moveQuestion(index, dir) {
    var questions = currentSurvey.questions || [];
    var newIndex = index + dir;
    if (newIndex < 0 || newIndex >= questions.length) return;
    var tmp = questions[index];
    questions[index] = questions[newIndex];
    questions[newIndex] = tmp;
    renderQuestions();
  }

  function removeQuestion(index) {
    if (!confirm('この質問を削除しますか？')) return;
    currentSurvey.questions.splice(index, 1);
    renderQuestions();
  }

  async function saveQuestions() {
    if (!currentSurvey) return;
    try {
      var res = await fetch(BASE_URL + '/api/surveys', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'x-admin-token': token() },
        body: JSON.stringify({ id: currentSurvey.id, tenant: TENANT, questions: currentSurvey.questions })
      });
      if (res.status === 401) { doLogout(); return; }
      if (res.ok) { showStatus('questionsStatus', '✅ 保存しました', 'success'); }
      else { showStatus('questionsStatus', '❌ 保存失敗', 'error'); }
    } catch (e) { showStatus('questionsStatus', '❌ エラー', 'error'); }
  }

  function openAddQuestion() {
    editingQuestionIndex = -1;
    document.getElementById('modalTitle').textContent = '質問を追加';
    document.getElementById('qLabel').value = '';
    document.getElementById('qType').value = document.getElementById('newQuestionType').value;
    document.getElementById('qPlaceholder').value = '';
    document.getElementById('qRequired').checked = false;
    onQTypeChange();
    document.getElementById('optionsList').innerHTML = '';
    addOptionRow(); addOptionRow();
    document.getElementById('questionModal').classList.add('show');
  }

  function openEditQuestion(index) {
    editingQuestionIndex = index;
    var q = currentSurvey.questions[index];
    document.getElementById('modalTitle').textContent = '質問を編集';
    document.getElementById('qLabel').value = q.label || '';
    document.getElementById('qType').value = q.type || 'text';
    document.getElementById('qPlaceholder').value = q.placeholder || '';
    document.getElementById('qRequired').checked = q.required || false;
    onQTypeChange();
    document.getElementById('optionsList').innerHTML = '';
    (q.options || ['', '']).forEach(function(opt) { addOptionRow(opt); });
    document.getElementById('questionModal').classList.add('show');
  }

  function onQTypeChange() {
    var type = document.getElementById('qType').value;
    var needsOptions = type === 'radio' || type === 'checkbox' || type === 'select';
    document.getElementById('optionsGroup').style.display = needsOptions ? '' : 'none';
    // 選択肢系は記入例不要なので非表示
    document.getElementById('placeholderGroup').style.display = needsOptions ? 'none' : '';
  }

  function addOptionRow(value) {
    var row = document.createElement('div');
    row.className = 'option-row';
    row.innerHTML = '<input type="text" placeholder="選択肢を入力" value="' + (value || '') + '">' +
      '<button onclick="this.parentElement.remove()">✕</button>';
    document.getElementById('optionsList').appendChild(row);
  }

  function saveQuestion() {
    var label = document.getElementById('qLabel').value.trim();
    if (!label) { alert('質問文を入力してください'); return; }
    var type = document.getElementById('qType').value;
    var placeholder = document.getElementById('qPlaceholder').value.trim();
    var required = document.getElementById('qRequired').checked;
    var options = [];
    if (type === 'radio' || type === 'checkbox' || type === 'select') {
      document.querySelectorAll('#optionsList .option-row input').forEach(function(inp) {
        if (inp.value.trim()) options.push(inp.value.trim());
      });
      if (options.length === 0) { alert('選択肢を1つ以上入力してください'); return; }
    }
    var q = { id: 'q_' + Date.now(), label: label, type: type, required: required, options: options };
    if (placeholder) q.placeholder = placeholder;
    if (!currentSurvey.questions) currentSurvey.questions = [];
    if (editingQuestionIndex >= 0) {
      q.id = currentSurvey.questions[editingQuestionIndex].id;
      currentSurvey.questions[editingQuestionIndex] = q;
    } else {
      currentSurvey.questions.push(q);
    }
    renderQuestions();
    closeModal('questionModal');
  }

  function closeModal(id) {
    document.getElementById(id).classList.remove('show');
  }

  function renderSurveyList() {
    var list = document.getElementById('surveyList');
    if (allSurveys.length === 0) {
      list.innerHTML = '<div class="empty">アンケートがありません。「新規作成」から作成してください。</div>';
      return;
    }
    list.innerHTML = allSurveys.map(function(s) {
      var date = new Date(s.createdAt).toLocaleDateString('ja-JP');
      var qCount = (s.questions || []).length;
      return '<div class="survey-item">' +
        '<div class="survey-item-info">' +
        '<div class="survey-item-title">' + s.title + '</div>' +
        '<div class="survey-item-meta">作成日：' + date + '　質問数：' + qCount + '件</div>' +
        '</div>' +
        '<div class="survey-item-actions">' +
        '<button class="btn btn-primary btn-sm" onclick="selectSurveyFromList(\'' + s.id + '\')">編集・確認</button>' +
        '<button class="btn btn-danger btn-sm" onclick="deleteSurvey(\'' + s.id + '\')">削除</button>' +
        '</div></div>';
    }).join('');
  }

  function selectSurveyFromList(id) {
    document.getElementById('surveySelect').value = id;
    onSurveyChange();
    switchTab('responses');
  }

  function openCreateSurvey() {
    document.getElementById('newSurveyTitle').value = '';
    document.getElementById('newSurveyDescription').value = '';
    document.getElementById('createSurveyModal').classList.add('show');
  }

  async function createSurvey() {
    var title = document.getElementById('newSurveyTitle').value.trim();
    if (!title) { alert('タイトルを入力してください'); return; }
    var description = document.getElementById('newSurveyDescription').value.trim();
    try {
      var res = await fetch(BASE_URL + '/api/surveys', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-token': token() },
        body: JSON.stringify({ tenant: TENANT, title: title, description: description, questions: [] })
      });
      if (res.status === 401) { doLogout(); return; }
      if (res.ok) {
        var newSurvey = await res.json();
        closeModal('createSurveyModal');
        await loadSurveys();
        document.getElementById('surveySelect').value = newSurvey.id;
        onSurveyChange();
        switchTab('builder');
      } else { alert('作成に失敗しました'); }
    } catch (e) { alert('エラー: ' + e.message); }
  }

  async function deleteSurvey(id) {
    if (!confirm('このアンケートを削除しますか？回答データは残ります。')) return;
    try {
      var res = await fetch(BASE_URL + '/api/surveys?id=' + id + '&tenant=' + TENANT, {
        method: 'DELETE',
        headers: { 'x-admin-token': token() }
      });
      if (res.status === 401) { doLogout(); return; }
      if (res.ok) {
        allSurveys = allSurveys.filter(function(s) { return s.id !== id; });
        if (currentSurvey && currentSurvey.id === id) {
          currentSurvey = null;
          document.getElementById('surveySelect').value = '';
          onSurveyChange();
        }
        renderSurveyList();
        loadSurveys();
      } else { alert('削除に失敗しました'); }
    } catch (e) { alert('エラー: ' + e.message); }
  }

  async function fetchPeriod() {
    if (!currentSurvey) return;
    try {
      var res = await fetch(BASE_URL + '/api/period?surveyId=' + currentSurvey.id);
      var period = await res.json();
      document.getElementById('startDateInput').value = period.startDate || '';
      document.getElementById('endDateInput').value   = period.endDate   || '';
      updatePeriodDisplay(period.startDate, period.endDate);
    } catch (e) {
      document.getElementById('currentPeriod').textContent = '取得できませんでした';
    }
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    var parts = dateStr.split('-');
    return parts[0] + '年' + parseInt(parts[1]) + '月' + parseInt(parts[2]) + '日';
  }

  function updatePeriodDisplay(startDate, endDate) {
    var el = document.getElementById('currentPeriod');
    if (!startDate && !endDate) {
      el.innerHTML = '現在の設定：<span>期間制限なし（常時受付中）</span>';
    } else if (startDate && endDate) {
      el.innerHTML = '現在の設定：<span>' + formatDate(startDate) + ' 〜 ' + formatDate(endDate) + '</span>';
    } else if (startDate) {
      el.innerHTML = '現在の設定：<span>' + formatDate(startDate) + ' 以降</span>';
    } else {
      el.innerHTML = '現在の設定：<span>' + formatDate(endDate) + ' まで</span>';
    }
  }

  async function savePeriod() {
    if (!currentSurvey) return;
    var startDate = document.getElementById('startDateInput').value || null;
    var endDate   = document.getElementById('endDateInput').value   || null;
    var status = document.getElementById('periodStatus');
    if (startDate && endDate && startDate > endDate) {
      status.className = 'period-status error';
      status.textContent = '⚠️ 開始日は終了日より前に設定してください。';
      return;
    }
    try {
      var res = await fetch(BASE_URL + '/api/period', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-token': token() },
        body: JSON.stringify({ surveyId: currentSurvey.id, tenant: TENANT, startDate: startDate, endDate: endDate })
      });
      if (res.ok) {
        status.className = 'period-status success';
        status.textContent = '✅ 受付期間を保存しました。';
        updatePeriodDisplay(startDate, endDate);
      } else { throw new Error('保存失敗'); }
    } catch (e) {
      status.className = 'period-status error';
      status.textContent = '❌ 保存に失敗しました。';
    }
    setTimeout(function() { status.style.display = 'none'; }, 3000);
  }

  async function clearPeriod() {
    if (!confirm('期間設定を削除しますか？')) return;
    document.getElementById('startDateInput').value = '';
    document.getElementById('endDateInput').value = '';
    await savePeriod();
  }

async function fetchResponses() {
    if (!currentSurvey) return;
    
    // ★がちゃがちゃ対策：前の通信がまだ実行中ならキャンセルする
    if (responseAbortController) {
      responseAbortController.abort();
    }
    responseAbortController = new AbortController();

    document.getElementById('tableBody').innerHTML = '<tr><td class="loading">読み込み中...</td></tr>';
    
    try {
      var res = await fetch(BASE_URL + '/api/response?surveyId=' + currentSurvey.id + '&tenant=' + TENANT, {
        headers: { 'x-admin-token': token() },
        signal: responseAbortController.signal // ★キャンセル信号をセット
      });
      if (res.status === 401) { doLogout(); return; }
      if (!res.ok) throw new Error('取得失敗');
      
      allResponses = await res.json();
      allResponses.sort(function(a, b) { return new Date(b.createdAt) - new Date(a.createdAt); });
      renderResponseTable();
    } catch (e) {
      // ★通信がキャンセルされた場合はエラーとして扱わず、何もしない
      if (e.name === 'AbortError') return; 
      
      document.getElementById('tableBody').innerHTML = '<tr><td class="empty">❌ ' + e.message + '</td></tr>';
    }
  }

  function renderResponseTable() {
    if (!currentSurvey) return;
    var questions = currentSurvey.questions || [];
    var thead = document.getElementById('tableHead');
    thead.innerHTML = '<tr><th>日時</th>' +
      questions.map(function(q) { return '<th>' + q.label + '</th>'; }).join('') +
      '<th>操作</th></tr>';
    var summaryArea = document.getElementById('summaryArea');
    summaryArea.innerHTML = '<div class="card hl"><div class="num">' + allResponses.length + '</div><div class="label">総回答数</div></div>';
    var tbody = document.getElementById('tableBody');
    if (allResponses.length === 0) {
      tbody.innerHTML = '<tr><td colspan="' + (questions.length + 2) + '" class="empty">回答データがありません</td></tr>';
      return;
    }
    tbody.innerHTML = allResponses.map(function(r) {
      var date = new Date(r.createdAt).toLocaleString('ja-JP', { month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit' });
      var cells = questions.map(function(q) {
        var val = r.answers ? (r.answers[q.id] || '—') : '—';
        return '<td style="max-width:180px">' + val + '</td>';
      }).join('');
      return '<tr><td style="white-space:nowrap;color:#888">' + date + '</td>' + cells +
        '<td><button class="btn-delete-sm" onclick="deleteResponse(\'' + r.id + '\')">削除</button></td></tr>';
    }).join('');
  }

  async function deleteResponse(id) {
    if (!confirm('この回答を削除しますか？')) return;
    try {
      var res = await fetch(BASE_URL + '/api/response?id=' + id + '&tenant=' + TENANT, {
        method: 'DELETE',
        headers: { 'x-admin-token': token() }
      });
      if (res.status === 401) { doLogout(); return; }
      if (res.ok) {
        allResponses = allResponses.filter(function(r) { return r.id !== id; });
        renderResponseTable();
      } else { alert('削除に失敗しました'); }
    } catch (e) { alert('削除エラー: ' + e.message); }
  }

  function downloadCSV() {
    if (!currentSurvey || allResponses.length === 0) { alert('データがありません'); return; }
    var questions = currentSurvey.questions || [];
    var headers = ['日時'].concat(questions.map(function(q) { return q.label; }));
    var rows = allResponses.map(function(r) {
      var date = new Date(r.createdAt).toLocaleString('ja-JP');
      var cells = questions.map(function(q) {
        var val = r.answers ? (r.answers[q.id] || '') : '';
        return '"' + String(val).replace(/"/g, '""') + '"';
      });
      return ['"' + date + '"'].concat(cells).join(',');
    });
    var bom = '\uFEFF';
    var csv = bom + [headers.map(function(h) { return '"' + h + '"'; }).join(',')].concat(rows).join('\n');
    var a = document.createElement('a');
    a.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv' }));
    a.download = (currentSurvey.title || 'survey') + '_' + new Date().toISOString().slice(0,10) + '.csv';
    a.click();
  }

  function showStatus(id, msg, type) {
    var el = document.getElementById(id);
    el.className = 'status-msg ' + type;
    el.textContent = msg;
    el.style.display = 'inline-block';
    setTimeout(function() { el.style.display = 'none'; }, 3000);
  }
</script>
</body>
</html>
