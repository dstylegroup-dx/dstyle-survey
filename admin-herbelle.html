<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Herbelle 管理画面</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #f7f9fa; color: #333; padding: 20px; }
        .container { max-width: 1000px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { font-size: 22px; color: #4A5D4E; margin-bottom: 20px; border-bottom: 2px solid #4A5D4E; padding-bottom: 10px; }
        
        /* 認証エリア */
        .login-box { max-width: 400px; margin: 50px auto; padding: 30px; background: #fff; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); text-align: center; }
        .login-box input { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 16px; text-align: center; }
        .login-box button { width: 100%; padding: 12px; background: #4A5D4E; color: white; border: none; border-radius: 4px; font-size: 16px; font-weight: bold; cursor: pointer; }
        
        /* メインコンテンツ（初期は非表示） */
        #adminContent { display: none; }
        
        /* テーブルスタイル */
        .table-wrapper { overflow-x: auto; margin-top: 20px; }
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; font-size: 14px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #4A5D4E; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        
        .btn-refresh { padding: 10px 20px; background: #4A5D4E; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        .loading { font-weight: bold; color: #666; margin: 20px 0; }
    </style>
</head>
<body>

<div id="loginArea" class="login-box">
    <h2 style="color:#4A5D4E; margin-bottom:20px;">Herbelle 管理認証</h2>
    <input type="password" id="passwordInput" placeholder="パスワードを入力">
    <button onclick="checkPassword()">ログイン</button>
    <p id="loginError" style="color:red; font-size:14px; margin-top:10px; display:none;">⚠️ パスワードが違います</p>
</div>

<div id="adminContent" class="container">
    <h1>Herbelle 無料体験アンケート 回答一覧</h1>
    <button class="btn-refresh" onclick="fetchSurveys()">🔄 データを最新に更新</button>
    
    <div id="loadingMessage" class="loading" style="display:none;">データを読み込み中...</div>
    
    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>日時</th>
                    <th>お名前</th>
                    <th>体験メニュー</th>
                    <th>満足度</th>
                    <th>テックへの興味</th>
                    <th>ご意見・ご感想</th>
                </tr>
            </thead>
            <tbody id="surveyTableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    // 💡 ご指定いただいたパスワード
    const SECRET_PW = "Herbelle19860701";

    function checkPassword() {
        const input = document.getElementById('passwordInput').value;
        const loginArea = document.getElementById('loginArea');
        const adminContent = document.getElementById('adminContent');
        const loginError = document.getElementById('loginError');

        if (input === SECRET_PW) {
            loginArea.style.display = 'none';
            adminContent.style.display = 'block';
            fetchSurveys(); // ログイン成功時にデータを取得
        } else {
            loginError.style.display = 'block';
        }
    }

    // Enterキーでもログインできるようにする
    document.getElementById('passwordInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') checkPassword();
    });

    async function fetchSurveys() {
        const tbody = document.getElementById('surveyTableBody');
        const loading = document.getElementById('loadingMessage');
        
        tbody.innerHTML = '';
        loading.style.display = 'block';

        try {
            // 💡 Cosmos DBからデータを引っ張ってくるAPI（GETリクエスト）
            // ※Static Web Appsの仕様に合わせて構築します
            const response = await fetch('/api/log?tenant=herbelle-chitosehunabashi&type=free_trial_survey');
            
            if (!response.ok) throw new Error('データの取得に失敗しました');
            
            const data = await response.json();
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">まだ回答データがありません。</td></tr>';
                return;
            }

            // 日時が新しい順に並び替え
            data.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

            data.forEach(item => {
                const tr = document.createElement('tr');
                
                // 日時を日本時間に変換して見やすく
                const date = new Date(item.createdAt).toLocaleString('ja-JP');

                tr.innerHTML = `
                    <td style="white-space:nowrap;">${date}</td>
                    <td style="white-space:nowrap; font-weight:bold;">${item.customerName || ''}</td>
                    <td style="white-space:nowrap;">${item.menu || ''}</td>
                    <td style="white-space:nowrap;">${item.satisfaction || ''}</td>
                    <td>${item.techInterest || ''}</td>
                    <td>${item.feedback || ''}</td>
                `;
                tbody.appendChild(tr);
            });

        } catch (error) {
            tbody.innerHTML = `<tr><td colspan="6" style="text-align:center; color:red;">❌ エラー: ${error.message}</td></tr>`;
        } finally {
            loading.style.display = 'none';
        }
    }
</script>
</body>
</html>
